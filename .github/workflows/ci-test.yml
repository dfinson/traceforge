name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group dev
      - run: uv run pytest --tb=short -q --cov=traceforge --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install hatchling build
      - run: python -m build
      # traceforge now depends on traceforge-title-model, which is not on PyPI until
      # its own release tag is pushed. Build it into dist/ and resolve it locally
      # via --find-links so the base-wheel install works pre-publish (litellm,
      # onnxruntime, etc. still come from PyPI).
      - run: python -m build packages/traceforge-title-model --outdir dist
      - run: pip install --find-links dist traceforge-toolkit
      - run: python -c "import traceforge; print(traceforge.__name__)"
