name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # Checkout WITHOUT fetching LFS objects. With lfs:false the *.onnx/*.safetensors
      # files are left as ~133-byte LFS pointer text, so no LFS bandwidth is spent here.
      - uses: actions/checkout@v6
        with:
          lfs: false
      # Cache the local LFS object store. The cache key hashes the checked-out pointer
      # files, whose content embeds each weight's sha256 OID, so the key changes exactly
      # when a weight changes. On a cache hit, `git lfs pull` below finds every object
      # locally and makes NO call to the LFS server.
      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-v1-${{ hashFiles('**/*.onnx', '**/*.safetensors') }}
          restore-keys: |
            lfs-v1-
      # Materialize weights into the working tree from the local (cached) store.
      # Cache hit: zero network. Cache miss: one fetch from the LFS server (needs budget),
      # then the cache step saves .git/lfs for subsequent runs.
      - name: Materialize LFS weights
        run: git lfs pull
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group dev
      - run: uv run pytest --tb=short -q --cov=traceforge --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout WITHOUT fetching LFS objects (see the `test` job for the full rationale):
      # lfs:false leaves the weights as LFS pointer text and spends no LFS bandwidth.
      - uses: actions/checkout@v6
        with:
          lfs: false
      # Cache the local LFS object store, keyed to the weight OIDs embedded in the
      # checked-out pointer files. Cache hit => `git lfs pull` runs offline.
      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-v1-${{ hashFiles('**/*.onnx', '**/*.safetensors') }}
          restore-keys: |
            lfs-v1-
      # Materialize weights from the local (cached) store before anything loads them.
      - name: Materialize LFS weights
        run: git lfs pull
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      # Build + stage the SPA so `python -m build` exercises the same wheel-bundling
      # path as the release (publish.yml) and catches packaging regressions.
      - run: python scripts/build_dashboard.py
      - run: pip install hatchling build
      - run: python -m build
      # traceforge now depends on traceforge-title-model, which is not on PyPI until
      # its own release tag is pushed. Build it into dist/ and resolve it locally
      # via --find-links so the base-wheel install works pre-publish (litellm,
      # onnxruntime, etc. still come from PyPI).
      - run: python -m build packages/traceforge-title-model --outdir dist
      - run: pip install --find-links dist traceforge-toolkit
      - run: python -c "import traceforge; print(traceforge.__name__)"

  dashboard-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      # Deterministic install/typecheck/build of the ported SPA (dashboard/).
      # pnpm is pinned via package.json "packageManager"; npm is intentionally
      # unused (see docs/dashboard-spec.md).
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm exec tsc -b
      - run: corepack pnpm build
      - run: corepack pnpm exec vitest run

