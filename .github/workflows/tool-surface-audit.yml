name: Weekly Tool Surface Audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit-tool-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7

      # traceforge depends on traceforge-title-model, which is resolved from the
      # in-repo path via [tool.uv.sources] (uv-only) rather than PyPI. Plain pip
      # ignores that source and 404s, so this audit uses uv sync like ci-test.yml.
      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate YAML data files
        run: |
          uv run python -c "
          import sys
          import yaml
          from pathlib import Path

          data_dir = Path('src/traceforge/classify/data')
          errors = []

          for f in sorted(data_dir.glob('*.yaml')):
              try:
                  with open(f, encoding='utf-8') as fh:
                      data = yaml.safe_load(fh)
                  if data is None:
                      errors.append(f'{f.name}: empty file')
                  print(f'  ✓ {f.name} — {type(data).__name__}')
              except yaml.YAMLError as e:
                  errors.append(f'{f.name}: {e}')

          if errors:
              print('\n❌ YAML validation errors:')
              for err in errors:
                  print(f'  • {err}')
              sys.exit(1)
          else:
              print('\n✅ All YAML files valid')
          " 2>&1 | tee -a audit-output.txt

      # Delegates to the maintained unit tests (single source of truth) instead
      # of re-deriving enum rules inline — that inline copy drifted from the
      # typed config API and rotted silently for a month. These tests validate
      # tool_classifications + binary_info + mcp_profiles enum values against the
      # registry.validate() API. See tests/unit/test_classification.py.
      - name: Validate enum dimensions in YAML
        run: |
          uv run pytest tests/unit/test_classification.py -k "enum_values" -q 2>&1 | tee -a audit-output.txt

      - name: Run classification engine smoke test
        run: |
          uv run python -c "
          from traceforge.classify import get_default_engine, classify_shell, classify_tool
          from traceforge.classify.mcp import classify_mcp_tool
          from functools import partial

          engine = get_default_engine()
          classify_shell = partial(classify_shell, engine=engine)
          classify_tool = partial(classify_tool, engine=engine)
          classify_mcp_tool = partial(classify_mcp_tool, engine=engine)

          # Smoke test core classification paths
          assert classify_shell('pytest tests/').effect is not None, 'pytest classification failed'
          assert classify_shell('git push origin main').effect is not None, 'git push classification failed'
          assert classify_tool('edit') is not None, 'edit tool classification failed'
          assert classify_tool('bash') is not None, 'bash tool classification failed'
          assert classify_mcp_tool('mcp__github__list_repos') is not None, 'MCP github classification failed'
          assert classify_mcp_tool('mcp__filesystem__read_file') is not None, 'MCP filesystem classification failed'

          print(f'✅ Engine loaded: {len(engine.binary_info)} binaries, {len(engine.shell_rules)} rules')
          print(f'   {len(engine.mcp_alias_index)} MCP profile aliases')
          print(f'   {len(engine.canonical_tools)} canonical tools')
          print('✅ All smoke tests passed')
          " 2>&1 | tee -a audit-output.txt

      - name: Run full test suite
        run: uv run pytest tests/ -q --tb=short 2>&1 | tee -a audit-output.txt

      - name: Report summary
        if: always()
        run: |
          uv run python -c "
          from traceforge.classify import get_default_engine
          engine = get_default_engine()
          print('## Tool Surface Summary')
          print(f'- **Binaries**: {len(engine.binary_info)}')
          print(f'- **Shell rules**: {len(engine.shell_rules)}')
          print(f'- **MCP profiles**: {len(engine.mcp_alias_index)} aliases')
          print(f'- **Canonical tools**: {len(engine.canonical_tools)}')
          print(f'- **Risk config keys**: {len(engine.risk_config)}')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: File issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('audit-output.txt')
              ? fs.readFileSync('audit-output.txt', 'utf8')
              : '(no step output was captured before the failure — check the workflow logs)';
            const title = 'Weekly Tool Surface Audit is failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## Tool Surface Audit Failure`,
              ``,
              `**Detected:** ${new Date().toISOString().split('T')[0]}`,
              `**Workflow run:** ${runUrl}`,
              ``,
              `### Captured Output`,
              '```',
              output.slice(-4000),
              '```',
              ``,
              `This is an automated tracking issue. It is updated (not duplicated) on each subsequent failure and should be closed once the audit is green again.`,
            ].join('\n');

            // Dedup against any open tracking issue with our label.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tool-surface-failure',
            });
            const match = existing.data.find(i => i.title.includes('Tool Surface Audit'));
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Still failing as of ${new Date().toISOString()}.\n\n**Run:** ${runUrl}\n\n\`\`\`\n${output.slice(-3000)}\n\`\`\``,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['tool-surface-failure', 'automated'],
              });
            }
