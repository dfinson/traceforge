[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tracemill"
version = "0.1.0"
description = "Agent event observation pipeline with pluggable storage backends"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "tree-sitter>=0.24",
    "tree-sitter-bash>=0.24",
    "tree-sitter-powershell>=0.24",
    "github-copilot-sdk>=1.0.0,<2",
    "claude-agent-sdk>=0.2.93,<1",
]

[project.optional-dependencies]
langgraph = ["langgraph>=1.2.4,<2"]
pydantic-ai = ["pydantic-ai-slim>=1.106.0,<2"]
smolagents = ["smolagents>=1.26.0,<2"]
autogen = ["autogen-agentchat>=0.7.5,<1"]
sqlite = ["aiosqlite>=0.19"]
otel = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
]
all = [
    "tracemill[langgraph]",
    "tracemill[pydantic-ai]",
    "tracemill[smolagents]",
    "tracemill[autogen]",
    "tracemill[sqlite]",
    "tracemill[otel]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.hatch.build.targets.wheel]
packages = ["src/tracemill"]
