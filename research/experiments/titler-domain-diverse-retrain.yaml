# Domain-diverse retrain of the tiny ORT titler (track A): fold a second ORGANIC
# agent source (claude-cli) into the training pool and drop the scaffolded
# swe-agent corpus, so the served titler is trained only on the populations it
# actually serves.
#
# Companion scripts:
#   research/scripts/_title_t5_train.py       (build / train / eval; source whitelist + mass policy)
#   research/scripts/_title_compose.py        (SRC_DIR; claude-cli folded in)
#   research/scripts/ingest_claude_corpus.py  (claude jsonl -> labeling-corpus parquet)
#   research/scripts/_title_quant.py          (int8 ONNX quantize)
#   research/scripts/_title_toc_metrics.py    (served-path quality deltas, --model-dir override)
#   research/scripts/_title_judge.py          (paired LLM judge; settled the source-axis decision)
#
# MLflow: _title_t5_train.py (train + eval runs) and _title_judge.py (llm-judge
#   run) log params/metrics to this experiment via tracemill_research.mlflow_utils.
#
# PROBLEM. The shipped tiny-v2 titler was trained on copilot-cli-native +
# swe-agent-nebius. swe-agent is a heavily SCAFFOLDED corpus (one title repeated
# up to 269x) that the model does not deploy against, and it bleeds generic
# "reproduce / verify / submit" shapes into every organic source. Meanwhile the
# titler only ever saw ONE organic agent (copilot), so nothing measured whether
# it generalizes across agents.
#
# CHANGE (parameter-free, no source tags in the model, no tuned thresholds).
# Add a SECOND organic agent source (claude-cli, ingested through the SAME
# distilled_context pipeline) and train on the two organic sources only. Source
# mass follows NATURAL frequency (TITLE_SRC_ALPHA=1: per-source mass ~ row
# count), which the paired LLM-judge found beats equal-per-source 50/50 — i.e.
# the rarer source needs no artificial protection. swe-agent is whitelisted out.

experiment:
  name: titler-domain-diverse-retrain
  mlflow_experiment: titler-domain-diverse-retrain-v1
  display_name: "Titler — Domain-Diverse Organic Retrain (copilot + claude, swe dropped)"
  description: |
    Retrain the google/t5-efficient-tiny titler on the two ORGANIC agent sources
    (copilot-cli-native + claude-cli) at NATURAL source frequency, dropping the
    scaffolded swe-agent-nebius corpus. The torch model is exported no-past to
    ONNX and int8-quantized (byte-identical artifact sizes to the shipped model),
    then served via the torch-free ORT runtime.

    SETTLED VIA PAIRED LLM-JUDGE (identical heldout). Source is NOT a real axis to
    balance across: copilot + claude are one population (same vendor model /
    pipeline / very similar harness). claude SATURATES at 67% coherence at ANY
    mass (10/20/50%), so it needs no upweight; source-balancing copilot<->claude
    HURTS (forced 50/50 drops copilot to 49% coherent, its worst); natural
    frequency is best (copilot 55 / claude 67). swe-agent is dead weight once
    claude is in (organic-parity copilot 52 < no-swe 55) -> dropped. Net vs the
    canonical tiny-v2: claude +13 coherent (OOD->in-pool), copilot -7 (noise).

    SERVED-PATH CONFIRMATION (this export, _title_toc_metrics, 982 titled
    segments over 5 held-out copilot-cli-native sessions, CPU-only, grounded-
    adaptive decode ON). In-distribution copilot is at PARITY — the retrain does
    not regress the served copilot path — while the breadth gain (claude) was
    judged separately above. Verb concentration is unchanged because natural-pool
    keeps copilot at ~80% mass, so the copilot title distribution barely shifts;
    the value is the second organic population, not a copilot re-shaping.
  tags:
    component: titler
    pillar: generalization
    stage: train-and-serve
    constraint: cpu-near-zero-footprint

dataset:
  source: labeling-corpus
  build: research/scripts/_title_t5_train.py build   (t5-title-dataset.parquet, 3 sources on disk)
  train_whitelist: [copilot-cli-native, claude-cli]   # TITLE_SOURCES; swe-agent-nebius excluded
  source_mass_policy: natural-frequency               # TITLE_SRC_ALPHA=1 (per-source mass ~ row count)
  train_rows: { copilot-cli-native: 1323, claude-cli: 333 }
  distinct_titles: { copilot-cli-native: 1274, claude-cli: 295 }
  eval_note: >
    served-path metrics scored on the 12 largest sharded copilot-cli-native
    sessions (5 distinct), capped 800 events each.

model:
  base: google/t5-efficient-tiny
  params: ~16M (4 enc / 4 dec)
  train: { epochs: 12, batch_size: 32, lr: 3e-4, device: cuda (RTX A500), final_loss: 3.95 }
  export: optimum no-past (text2text-generation) -> int8 AVX2 dynamic quantize
  serve: torch-free onnxruntime + tokenizers + numpy, single CPU core, grounded-adaptive decode

conditions:
  - id: shipped-tinyv2
    pool: copilot-cli-native + swe-agent-nebius
    role: baseline (currently served before this change)
  - id: natural-pool
    pool: copilot-cli-native + claude-cli (natural freq), swe dropped
    role: SELECTED — promoted to src/tracemill/title/data

results:
  # served-path quality (_title_toc_metrics, grounded-adaptive ON, CPU-only).
  # 982 titled segments / 131 activities; same held-out sessions both conditions.
  shipped-tinyv2:
    titled_coverage_pct: 98.0
    verb_top1_pct: 44.9
    verb_h_over_hmax: 0.57
    content_grounded_pct: 79.1
    hallucinated_id_pct: 3.4
    near_dup_activity_pct: 13.7
  natural-pool:
    titled_coverage_pct: 98.0
    verb_top1_pct: 44.6          # flat (in-dist copilot distribution ~unchanged)
    verb_h_over_hmax: 0.57       # flat
    content_grounded_pct: 78.7
    hallucinated_id_pct: 2.4     # -1.0 pp vs shipped
    near_dup_activity_pct: 15.3  # +1.6 pp (within n-noise)
  # OOD / breadth gain (paired LLM-judge, prior segment; identical heldout):
  llm_judge_coherent_pct:
    copilot: { tinyv2: 62, natural_pool: 55 }   # -7, noise
    claude:  { tinyv2: 54, natural_pool: 67 }   # +13, OOD -> in-pool

acceptance:
  rule: >
    Folding in a second organic agent source at natural frequency (swe dropped)
    must NOT regress the served copilot path and must add measured generalization
    to the new organic population. Met: in-dist copilot at parity (verb diversity
    flat, hallucination 3.4 -> 2.4, near-dup within noise), claude +13 coherent by
    paired judge. CPU single-core footprint unchanged (same arch + int8 export,
    byte-identical artifact sizes). Promoted to src/tracemill/title/data.

mlflow:
  log_params:
    - title_sources
    - title_src_alpha
    - base_model
    - epochs
  log_metrics:
    - verb_top1_pct
    - verb_h_over_hmax
    - hallucinated_id_pct
    - content_grounded_pct
    - near_dup_activity_pct
