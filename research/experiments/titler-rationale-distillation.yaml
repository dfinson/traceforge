# Rationale distillation: teach the tiny titler to COMPREHEND, not just to map.
#
# The promoted multitask titler titles distilled spans well, but on RAW user
# requests it floors at 38% coherent (LLM judge, n=80 codeplane heldout; gold
# ceiling 92%, h2h model 6% / tie 15% / gold 79%). The failure is NOT output
# shape -- fluent 1.76/2, verb!=obj 99% -- it is FAITHFULNESS (1.18/2 vs gold
# 1.88): the 16M encoder cannot locate the buried intent in a rambling clause
# ("Save reverts to default" lost inside "max concurrent jobs and settings").
# Beam inspection confirmed the wall: across 6 beams NONE captured the real ask,
# so no reranker / decode-hygiene / extract-then-title pass can recover it
# (extract-then-title also DEAD here: narration shrinks these prompts a median
# of 0% -- the noise is intra-sentence, and 1 in 4 prompts narrate to empty).
#
# Capacity bump (t5-small ~60M) is OFF the table for footprint reasons. So the
# question: can a fixed ~16M T5 be made to comprehend better WITHOUT more params?
#
# LEVER (literature-grounded). Distilling Step-by-Step (Hsieh et al., ACL 2023
# Findings, arXiv:2305.02301): train the small model MULTITASK to predict the
# label AND a teacher-generated RATIONALE, under distinct task prefixes. The
# rationale injects "task knowledge the small model would otherwise need lots of
# data to learn"; their small T5s beat up-to-2000x larger LLMs BECAUSE of it.
# Our failure mode is precisely "needs to learn to locate intent" -- the rationale
# task supervises that at fixed params. The rationale head is AUXILIARY: queried
# only in training, never at serve, so footprint is unchanged (zero extra decode).
#
# Architectural fit (arXiv:2109.10686, Tay et al., "Scale Efficiently"): at a
# fixed small budget, depth buys compositional parsing more than width. The
# existing nl6/nl8/nl12 depth sweep is the local corroboration; depth-narrow is a
# parallel lever, not part of this experiment.
#
# Companion scripts:
#   research/scripts/_title_rationale.py   (Sonnet rationale generator + corpus
#                                            augmentation: appends rationale rows
#                                            with task=rationale, distinct prefix)
#   research/scripts/_title_t5_train.py    (train/eval; per-row prefix routing,
#                                            (src,task)-parity balancing when a
#                                            `task` column is present)
#   research/scripts/_title_judge.py       (blinded LLM A/B coherence + h2h vs gold;
#                                            request head judged on the codeplane reals)
#   research/scripts/_title_export.py      (torch -> no-past int8 ONNX -> promote)
#
# MLflow: _title_t5_train.py logs here via TITLE_EXPERIMENT / TITLE_EXPERIMENT_YAML.

experiment:
  name: titler-rationale-distillation
  mlflow_experiment: titler-rationale-distillation-v1
  display_name: "Titler - Rationale Distillation (comprehension at fixed ~16M)"
  description: |
    Add an AUXILIARY rationale task to the multitask tiny titler so the encoder
    learns to LOCATE the buried request intent, lifting request-head faithfulness
    without growing params or serve footprint. Method = Distilling Step-by-Step
    (arXiv:2305.02301): co-train title (label) and rationale tasks under distinct
    T5 prefixes; the rationale head is discarded at inference (zero extra decode).
    Two outcomes are measured: (1) request-head coherence on the SAME 260 codeplane
    real prompts that scored 38% for the promoted model, and (2) whether a sharper
    top-1 distribution lets the span head match best-of-5 at beam-1 (a serve-time
    footprint cut, since the hot loop runs TITLE_BEAMS=5 escalating to 10).
  tags:
    component: titler
    pillar: generalization
    stage: train-and-serve
    constraint: cpu-near-zero-footprint
    parent: titler-prompt-to-task
    method: distilling-step-by-step
    citations: "arXiv:2305.02301 (Distilling Step-by-Step); arXiv:2109.10686 (Scale Efficiently)"

dataset:
  source: promoted multitask parquet (span + request rows) + teacher rationale rows
  augment: research/scripts/_title_rationale.py   (-> t5-title-rationale.parquet)
  base_rows_from: t5-title-multitask.parquet       (the promoted multitask dataset)
  rationale_provenance: >
    For every TRAIN row (span and request), the blessed Sonnet labeler emits ONE
    plain, entity-rich sentence stating the buried intent (request rows: the
    concrete action + the specific thing it acts on, grounded in the message;
    span rows: what the agent did + to what, grounded in the trace). The rationale
    is richer than the gold title on purpose -- it names the entities and relation
    the encoder must learn to find, which the terse gerund title omits. One
    rationale per train row; held-out rows are NOT augmented (judged on title only).
  task_prefixes:
    span_title: "summarize agent step: "
    request_title: "title task from request: "
    span_rationale: "explain step: "
    request_rationale: "explain request: "
  task_column: task            # {title, rationale}; enables (src,task)-parity balancing
  split: inherited from base parquet (session/content-hash heldout, parameter-free)

model:
  base: google/t5-efficient-tiny
  params: ~16M (4 enc / 4 dec)   # UNCHANGED; the lever is the objective, not the size
  multitask: per-row T5 prefix routes {span,request} x {title,rationale}; one shared model
  init: warm-start from the promoted multitask checkpoint (data/interim/t5-title-multitask-parity-model)
  balancing: >
    (src, task)-parity when a `task` column is present (generalizes the validated
    equal-per-source sampler to equal-per-(source,task)). Parameter-free: parity =
    1/n_tasks per source, mirroring Distilling Step-by-Step's equal label/rationale
    weighting; falls back to source-only balancing for single-task datasets.
  max_tgt: 48                    # raised from 20 so richer rationale targets are not truncated; titles unaffected
  serve: torch-free onnxruntime; ONLY the title prefixes are ever decoded -> the
         rationale task adds ZERO serve footprint. Same int8 export + promote path.

conditions:
  - id: promoted-multitask-parity
    role: baseline -- the currently shipped model; request head 38% coherent on codeplane reals
  - id: rationale-distilled
    role: candidate -- baseline corpus + auxiliary rationale rows, (src,task)-parity, warm-started

acceptance:
  rule: >
    (a) Request head: coherence on the SAME 260 codeplane reals must beat the 38%
    baseline by a margin outside the judge noise band, with faithfulness (not just
    fluency) carrying the lift. (b) Span head must NOT regress (copilot/claude
    coherence at parity). (c) Footprint unchanged at serve (rationale never decoded);
    BONUS: if span beam-1 coherence matches the current best-of-5, cut TITLE_BEAMS.
    Two-sided; rationale is auxiliary and must not steal capacity from titling.

# Results recorded after the run (judge verdict + beam-cut finding).
results:
  pilot_request_head:
    status: PROVES-ITSELF
    method_note: >
      Pilot trained the request head on a richer rationale-distilled corpus. To keep
      attribution clean, the candidate was trained FROM-SCRATCH on t5-efficient-tiny
      with the SAME recipe as the promoted model (organic-parity, 12 epochs, BS=32,
      LR=3e-4, MAX_TGT=48) PLUS the auxiliary rationale task -- NOT warm-started -- so
      the coherence delta is attributable to the rationale objective alone, not to a
      better init. Rationale rows: all 1119 request rows + a source-stratified span
      sample (1999 rationale rows total; subset build, match-request-head).
    eval:
      dataset: data/interim/t5-title-codeplane.parquet   # 260 codeplane real prompts, raw first-message
      heldout_judged: 80                                  # per-source-cap 80, random_state=17 (identical sids both models)
      judge: blinded Sonnet A/B, both models scored in FRESH same-run invocations (cross-run noise removed)
      judge_noise_floor: "2.5pt aggregate (same baseline model: 37.5% vs 35.0% across two runs; 8/80 item flips)"
    paired_coherent:
      baseline_parity: 0.350
      rationale_distilled: 0.512
      delta: "+0.162"           # ~6x the noise floor
    metrics_rationale_vs_baseline:
      faithful: "1.19 -> 1.29"   # the GATED metric carries the lift
      specific: "1.46 -> 1.63"
      fluent: "1.70 -> 1.78"     # flat: gain is comprehension, not decode fluency
    mechanism: >
      Win/loss inspection: baseline GARBLES comprehension on rambling prompts
      ("Add type annotations to typesr/utils module", "Fix viltaions of DRY and SOLID",
      "Dejudice cost section to SDKs"); the rationale model emits faithful, specific
      titles and recovers real entities ("Add type annotations to typer/utils.py",
      "Add GET /status endpoint"). 17 coherent flips 0->1 vs 6 1->0 (several of the 6
      are judge noise: identical preds scored differently across runs). Consistent with
      Distilling Step-by-Step: the auxiliary rationale task forces the encoder to LOCATE
      buried intent at fixed ~16M params.
    artifacts:
      model: data/interim/t5-title-rationale-model            # gitignored
      train_dataset: data/interim/t5-title-rationale-partial.parquet
      scores_rationale: data/interim/title-judge-scores-rationale-request.jsonl
      scores_baseline_rejudged: data/interim/title-judge-scores-parity-rejudged.jsonl
  next:
    - Span head must be judged for NON-regression (copilot/claude in-dist) before any promote.
    - Full rationale corpus (all 8445 title rows) + span beam-1-vs-best-of-5 measurement (the TITLE_BEAMS cut bonus).
    - If span holds, export int8 ONNX + promote via the standard path (rationale never decoded -> footprint invariant).
  span_head_nonregression:
    status: REGRESSED-on-this-checkpoint   # request head proved itself; this pilot checkpoint is NOT promotable
    eval:
      dataset: data/interim/t5-title-multitask.parquet
      sources: copilot-cli-native, claude-cli   # the in-dist organic generalisation targets named in acceptance
      judge: blinded Sonnet, both models scored in FRESH same-run invocations
      note: >
        Per-source UNPAIRED aggregates are the valid read (parse-near-full: rationale
        146/146, baseline 144/146). Step-level pairing by (src,sid) is INVALID for span
        rows because sid is the SESSION id, not step-unique, so the join collapses.
    copilot:
      coherent: "0.538 -> 0.525"   # within the 2.5pt noise floor: HOLDS
      specific: "1.49 -> 1.34"
      fluent: "1.85 -> 1.95"
    claude:
      coherent: "0.697 -> 0.591"   # -10.6pt, beyond noise: REGRESSED
      specific: "1.68 -> 1.47"
      fluent: "1.88 -> 1.97"
    diagnosis: >
      The +16pt request-head lift came at a span-head cost on THIS checkpoint, concentrated
      on claude coherence and on specificity (both sources). Decode got smoother (fluent up)
      while span comprehension fell. Two deliberate deviations from the intended recipe explain
      it, both fixable: (1) trained FROM-SCRATCH, not warm-started from the promoted model, so
      the checkpoint lacks its span maturity (the from-scratch choice was for clean request-head
      attribution, not a serving recipe); (2) the training snapshot carried only 281 span
      rationale rows (all 1119 request rationales but a partial span set), so the span head
      barely saw the auxiliary task.
    fix_path: >
      Retrain WARM-STARTED from the promoted multitask-parity checkpoint on the now-COMPLETE
      rationale corpus (build finished at 1999 rationale rows incl the full span set), then
      re-judge BOTH heads in fresh same-run invocations. Warm-start preserves span maturity;
      full span rationales give the span head the auxiliary signal. Promote only if request
      head holds its lift AND copilot/claude span return to parity.
  warm_start_full_corpus:
    status: NEGATIVE-strictly-dominated   # both fix hypotheses REJECTED
    recipe: warm-start from t5-title-multitask-parity-model on COMPLETE corpus (1119 request + 1118 span rationales), same organic-parity / 12ep / LR 3e-4 / MAX_TGT 48
    model: data/interim/t5-title-rationale-warm-model   # gitignored
    judge: blinded Sonnet, fresh same-run invocations; baselines = parity-rejudged (request) + parity-span
    request_head:
      coherent: "0.35 baseline -> 0.40 warm"   # +5pt only; from-scratch got +16pt (0.512)
      faithful: "1.175 (== baseline)"            # warm preserved the baseline weakness
    span_head:
      copilot_coherent: "0.538 -> 0.487"   # -5.1pt, WORSE than from-scratch
      claude_coherent: "0.697 -> 0.606"    # -9.1pt, still regressed
    conclusion: >
      Warm-start is strictly dominated: weaker request (+5 vs the from-scratch +16) AND no
      better span. Both fix hypotheses are REJECTED. (1) From-scratch did NOT cause the span
      regression -- warm regressed span just as much. (2) Partial span rationales were NOT the
      cause -- the warm run carried the FULL 1118 span rationales and still regressed. Two
      mechanisms, now isolated: (a) the request comprehension gain REQUIRES from-scratch
      encoder formation -- warm-starting preserves the promoted encoder's converged
      "ignore buried intent" prior, which 12 epochs of fine-tuning does not overcome; (b) the
      span regression is intrinsic to EQUAL (title:rationale) task mass -- co-training a
      rationale task the span head does not need halves its per-epoch title supervision. The
      request head floored at 38% and needed the rationale crutch; the span head was already
      54-70% and is taxed, not helped, by the auxiliary task.
    forks_for_human:
      - "Two-model routing: ship the from-scratch rationale model for the REQUEST prefix only, keep the promoted model for SPAN prefixes (titler already routes by prefix). Cost: ~2x served params (~32M total, still tiny/CPU-cheap), elegance."
      - "Need-weighted rationale mass: weight the rationale task by each head's measured comprehension deficit (request large, span ~0) instead of equal 1/2. Risk: deriving the weight parameter-free from validation faithfulness, not a hand-tuned knob."
      - "Curriculum anneal: rationale task heavy early (encoder formation) annealed out so late epochs are pure title, restoring full span title supervision after the comprehension prior is set. Parameter-light schedule, untested here."

  shipped:
    status: SHIPPED   # fork 1 (two-model prefix routing) chosen
    decision: >
      Chose fork 1 (two-model prefix routing). The from-scratch rationale model proved
      itself on the REQUEST head (+16.2pt, the one confound-free gain) but co-training
      strictly taxes the SPAN head, so a SINGLE model cannot carry both. Routing already
      keys on the T5 task prefix, so the cleanest ship is to serve the proven request
      model under the request prefix and keep the unregressed promoted multitask model
      for span prefixes. Forks 2 (need-weighted mass) and 3 (curriculum anneal) are
      deferred -- they aim to recover both heads in ONE model, which is an optimization
      of, not a blocker for, the shipped capability.
    serve_artifact: src/traceforge/title/data-request/   # int8 ONNX of the from-scratch request model (~33MB, committed like the span data/)
    routing: >
      TitleInferencer loads the packaged data-request/ model under the request prefix
      ("title task from request: ") ONLY on the fully-packaged default path; absent the
      artifact (or when a model is injected / a custom span dir is given) it falls back
      to reprefixing the span model -- the prior single-model behaviour, zero extra
      footprint. The request head is a once-per-session call (session titling), NOT in
      the hot per-event span loop, so the second ORT session adds memory only (~33MB
      int8 weights), no hot-path CPU. Both models load lazily and cap intra-op threads
      at 1. Verified: distinct ORT sessions, correct per-head prefixes, 31 title+pipeline
      tests pass (incl. a two-session routing regression test), ruff clean.

