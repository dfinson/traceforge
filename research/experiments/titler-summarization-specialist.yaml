# Titler SPECIALIZATION-vs-SCALE probe: does the faithfulness wall yield to a
# summarization-PRETRAINED backbone rather than to raw parameter count?
#
# MOTIVATION. Four levers have now been measured on the tiny (16M) span titler and
# every one leaves FAITHFULNESS pinned at ~1.4/2 (gold ~1.7):
#   * more DATA      (titler-commit-data)      627k commit subjects -> +0 faithful.
#   * more CAPACITY  (titler-small-capacity)   16M->80M -> +0.09 faithful only
#                                              (coherence +9pt = fluent lies).
#   * more DECODING  (titler-grounded-decoding) grammar/grounding, not truth.
#   * more INPUT     (titler-context-width)    3.16x wider ctx -> +0.02 faithful,
#                                              REGRESSED the copilot deploy target
#                                              (16M gets distracted). Capacity-bound.
# Scaling capacity buys ~+0.09 faithful per 5x params -- a wall, not a ramp. The
# lever NEVER tried is the pretraining OBJECTIVE. Every backbone so far is a raw
# LM-denoising T5 (t5-efficient / flan). Our failure mode is specifically
# FAITHFULNESS (selecting the salient action truthfully) -- exactly what an
# abstractive-SUMMARIZATION-pretrained model is optimised for.
#
# HYPOTHESIS. A model pretrained for faithful abstractive summarization
# (distilbart-cnn-12-6, distilled from bart-large-cnn on CNN/DailyMail) carries an
# inductive bias toward saying only what the source supports. If the wall is an
# OBJECTIVE gap, this lifts faithfulness at a param budget (306M) where raw scale
# (extrapolated flan-t5-base 248M) would buy only ~+0.05. If it does NOT beat the
# scale-extrapolation, the wall is intrinsic to the distilled-span task at CPU tier
# and the titler closes for good.
#
# IRON-RULE COMPLIANCE (no heuristics / hand-tuned caps / magic numbers):
#   * The trainer/judge are now ARCHITECTURE-AGNOSTIC (AutoModelForSeq2SeqLM), so
#     swapping T5<->BART changes ONLY the backbone string, nothing else. No
#     model-specific code path, no per-arch branch.
#   * LR=5e-5 is NOT a tuned eval knob: it is the STANDARD published fine-tune LR
#     for BART summarization checkpoints. T5-efficient's 3e-4 is the standard for a
#     dropout-free T5 trained from a denoising prior; applying it to an ALREADY
#     summarization-tuned BART would catastrophically overwrite the very prior
#     under test. Each backbone uses its own pretraining-matched LR -- that is
#     principled, not twiddling.
#   * BS=16 (vs 32 for tiny/small) is a MEMORY bound for the 4x-larger model on the
#     L4, not an eval choice; the per-epoch sample count (WeightedRandomSampler
#     num_samples=len(train)) is unchanged, so gradient coverage is identical.
#   * MAX_SRC=512 does not truncate: narrow ctx p90 is 157 tokens (< 512), so the
#     effective input is byte-identical to the tiny/small NARROW baseline.
#
# DESIGN (single variable = backbone objective). SAME dataset, split, sources,
# sampler, prefix, judge, and held-out rows as the tiny NARROW arm of
# titler-context-width -- so distilbart is DIRECTLY comparable to that anchor.
#   dataset : data/interim/t5-title-widetest-narrow.parquet  (shipped-context)
#   anchor  : tiny 16M narrow  = faithful 1.43 / coherent 61% / h2h 28-53 (n=100)
#   backbone: sshleifer/distilbart-cnn-12-6  (306M, summarization-pretrained)
#   train   : 12 epochs, bs16, lr5e-5, MAX_SRC=512, TITLE_SOURCES unset (full mix)
#   judge   : Sonnet SDK, SAME held-out sids, copilot-cli-native + claude-cli cap50.
#
# TIER CONTEXT (measured serve footprints, for the ship gate if this wins):
#   tiny  16M  -> 149 ms/seg, ~530-704MB RSS, 31MB int8
#   small 80M  -> 276 ms/seg, ~651MB RSS,     90MB int8
#   distilbart 306M -> UNMEASURED. 6 decoder layers (vs 12 enc) may keep the
#     autoregressive cost near small despite 3.8x params; pipebench REQUIRED before
#     any ship claim (near-zero-footprint mandate: fan/RAM starvation = autofail).

source:
  dataset: data/interim/t5-title-widetest-narrow.parquet  # reused; NOT re-ingested
  anchor_experiment: titler-context-width  # tiny 16M narrow arm = the baseline
  heldout: same md5(sid) split; copilot-cli-native + claude-cli cap 50 (n=100)

design:
  backbone: sshleifer/distilbart-cnn-12-6  # 306M, abstractive-summarization prior
  variable: pretraining OBJECTIVE only (summarization vs denoising-LM); code is
    architecture-agnostic (AutoModelForSeq2SeqLM)
  train: 12 epochs, bs16 (memory), lr5e-5 (BART-matched), MAX_SRC 512 (no trunc)
  judge: Sonnet SDK coherence + blinded h2h vs identical gold, SAME held-out rows

hypothesis: >-
  A summarization-pretrained backbone lifts FAITHFULNESS above the scale
  extrapolation at 306M, because faithful-abstractive-summary is the exact
  inductive bias our failure mode needs. Null result -> the ~1.7/2 gold faithful
  ceiling is intrinsic to titling a distilled span at CPU tier, and the titler
  closes: no backbone, data, capacity, decoding, or input lever moves it.

status: >-
  OPEN-POSITIVE (quality) / FOOTPRINT-FAIL (ship). distilbart (306M,
  summarization-pretrained) is the FIRST lever to meaningfully move FAITHFULNESS and
  CLOSE the gold gap. distilbart-XSUM (single-sentence-summary prior) reaches
  essentially GOLD PARITY -- coherent 70% vs gold 72%, faithful 1.57 vs gold 1.62
  (gap 0.05), MORE specific than gold (1.65 vs 1.61), ties/beats gold on claude h2h
  (40/24/36, 82% coherent). distilbart-CNN trails: faithful 1.50, coherent 60.
  Objective SHAPE (summary granularity) is the lever, not just family. BUT the ship
  gate FAILS at the artifact-size step: int8 ONNX = encoder 196MB + decoder 197MB =
  393MB (4.4x the small model's 90MB, 12.7x tiny's 31MB). DEAD ON ARRIVAL under the
  near-zero-footprint mandate -- no latency/RSS bench needed; 393MB alone autofails.
  IMPLICATION: the summarization prior is the proven quality lever, but 306M is not
  shippable. Next principled move = transfer the prior to a SMALL student
  (distill distilbart-xsum teacher -> tiny/small T5) or find a small summarization
  backbone; NOT ship the 306M artifact.

results:
  # distilbart trained on Lightning L4 (bs16, lr5e-5 BART-matched, 12ep, MAX_SRC
  # 512, full 3-source mix, SAME narrow dataset/split as the tiny anchor). final
  # train_loss 0.1722 (low, but heldout faithful/h2h moved UP -> not memorization).
  # Generated preds ON the L4 (--emit-preds, 23KB parquet shipped back -- NOT the
  # 1.2GB model), judged LOCALLY (Sonnet SDK), SAME held-out sids as
  # titler-context-width narrow arm (copilot+claude cap 50, n=100).
  anchor_tiny_narrow_16M: {faithful: 1.43, specific: 1.58, coherent: 0.61, h2h_model: 0.28, h2h_gold: 0.53}
  distilbart_306M:        {faithful: 1.50, specific: 1.69, coherent: 0.60, h2h_model: 0.38, h2h_gold: 0.45}
  # distilbart-XSUM (sshleifer/distilbart-xsum-12-6, same 306M, SAME dataset/split/
  # judge/held-out sids; single-sentence-summary prior vs CNN's multi-sentence). final
  # train_loss 0.3058. BEST result of the whole ladder: essentially at GOLD PARITY.
  distilbart_xsum_306M:   {faithful: 1.57, specific: 1.65, coherent: 0.70, h2h_model: 0.35, h2h_gold: 0.47}
  gold_ceiling_xsum_run:  {faithful: 1.62, specific: 1.61, fluent: 1.99, coherent: 0.72}  # model coherent 70 ~= gold 72
  train_loss: 0.1722
  gold_ceiling_faithful: {anchor: 1.66, distilbart: 1.63}
  model_to_gold_faithful_gap: {anchor: 0.23, distilbart: 0.13}  # HALVED
  by_source:
    copilot_cli_native:  # PRIMARY DEPLOY TARGET
      anchor:     {faithful: 1.28, coherent: 0.52, h2h_model: 0.30, h2h_gold: 0.54}
      distilbart: {faithful: 1.34, coherent: 0.48, h2h_model: 0.30, h2h_gold: 0.52}
    claude_cli:
      anchor:     {faithful: 1.58, coherent: 0.70, h2h_model: 0.26, h2h_gold: 0.52}
      distilbart: {faithful: 1.66, coherent: 0.72, h2h_model: 0.46, h2h_gold: 0.38}  # BEATS gold
      distilbart_xsum: {faithful: 1.70, specific: 1.74, coherent: 0.82, h2h_model: 0.40, h2h_gold: 0.36}  # ties/beats gold
    copilot_cli_native_xsum:  # residual weak locus, but improved over cnn
      distilbart_xsum: {faithful: 1.44, specific: 1.56, coherent: 0.58, h2h_model: 0.30, h2h_gold: 0.58}
  xsum_finding: >-
    distilbart-XSUM is the best result of the entire ladder and effectively reaches
    GOLD PARITY on the aggregate rubric: coherent 70% vs gold 72%, faithful 1.57 vs
    gold 1.62 (gap 0.05, down from cnn 0.13 and anchor 0.23), and it is MORE SPECIFIC
    than gold (1.65 vs 1.61). The single-sentence-summary (XSum) prior fits the title
    length/shape better than CNN/DailyMail's multi-sentence prior: coherent jumps
    60->70 vs cnn while faithful rises 1.50->1.57. On claude it ties/beats gold h2h
    (40/24/36) and hits 82% coherent. Residual weakness is unchanged in LOCUS
    (copilot: coherent 58%, gold wins h2h 58%) but the aggregate is now at ceiling.
    XSum > CNN confirms objective-shape (summary granularity), not just objective-
    family, is the lever.
  finding: >-
    POSITIVE on the wall. Every prior lever (data/capacity/decoding/input) left the
    model->gold FAITHFUL gap ~0.23 and h2h stuck ~28/53. The summarization prior
    HALVES that gap (0.13) and pulls h2h to 38/45 -- on claude the model now BEATS
    gold (46/38). faithful +0.07 and specific +0.11 aggregate; both organic sources
    improve faithful (copilot 1.28->1.34, claude 1.58->1.66). This is categorically
    different from the 80M scale rung (coherence +9 but faithful +0.09 = fluent
    lies): specialization buys TRUTH, not just fluency. The one non-move is the
    binary coherent gate (60 vs 61) -- on copilot distilbart sometimes collapses to
    a too-generic but FAITHFUL heading ("Commit changes" faith 2, judged
    not-coherent for vagueness). That is a specificity failure inside an otherwise
    faithful output, not the confident hallucination the tiny/small models produced.
  verdict: >-
    Hypothesis SUPPORTED: the faithfulness wall is partly an OBJECTIVE gap, not a
    pure scale/data/input gap. A 306M summarization-pretrained backbone is the
    first model to close half the gold faithful gap and reach near-parity h2h. This
    reopens the titler on a principled lever. It does NOT yet clear the ship bar:
    (1) coherent gate flat / copilot -4, (2) 306M CPU footprint UNMEASURED under
    the near-zero-footprint mandate.
  next: >-
    RESOLVED via SEQ-KD (see distillation block): the 306M teacher is DOA (393MB
    int8), but distilling its decodes into the shippable flan-t5-small (90MB)
    transfers essentially ALL its faithfulness. That is the ship path.

# ----------------------------------------------------------------------------
# SEQUENCE-LEVEL KNOWLEDGE DISTILLATION (Kim & Rush 2016) -- the SHIP PATH.
# The xsum teacher wins on QUALITY (faithful 1.57, gold-parity) but FAILS the
# footprint gate: int8 ONNX = 196MB enc + 197MB dec = 393MB, floored by
# bart-large's 1024-dim / 50264-vocab embedding (duplicated across enc/dec/lm_head
# in the no-past export). EVERY distilbart-xsum sibling shares that vocab/dim, so
# even the 1-1 config floors at ~184MB -- no sibling ships. The T5 student (32k
# spm vocab, 512-dim) exports to 31MB (tiny) / 90MB (small), so the only shippable
# route is transferring the teacher's objective-quality into a T5 student.
#
# METHOD (single variable, no knob): the teacher decodes a target title for every
# TRAIN row's ctx (scripts/_title_distill_label.py); the student trains on those
# teacher targets instead of raw gold. HELD-OUT rows keep REAL gold, so the judge
# stays teacher-independent. Identical trainer/sampler/prefix/heldout as every
# arm above -- only the train targets change.
distillation:
  method: seq-KD; teacher=distilbart-xsum-12-6 decodes train ctx -> student target
  teacher_target_stats: {distinct_ratio: 0.551, mean_words: 4.43}  # healthy, no collapse
  students: {tiny: google/t5-efficient-tiny (31MB int8), small: google/flan-t5-small (90MB int8)}
  train: 12ep, bs32, lr3e-4 (T5 student recipe), MAX_SRC 512, same balanced 3-source sampler
  # judged on the SAME 100 heldout sids (copilot+claude cap 50), REAL gold. Judge
  # gold-ceiling drifts run-to-run (fresh judge each run) -> compare FAITHFUL (the
  # wall) + within-run h2h, not raw coherent across runs.
  results:
    anchor_tiny_real_gold: {faithful: 1.43, coherent: 0.61, h2h_model: 0.28, h2h_gold: 0.53}
    distill_tiny:          {faithful: 1.42, specific: 1.59, coherent: 0.62, h2h_model: 0.30, h2h_gold: 0.55, gold_ceiling_faithful: 1.65}
    orig_small_real_gold:  {faithful: 1.50, coherent: 0.61}
    distill_small:         {faithful: 1.56, specific: 1.45, coherent: 0.63, h2h_model: 0.33, h2h_gold: 0.50, gold_ceiling_faithful: 1.70}
    teacher_xsum_306M:     {faithful: 1.57, coherent: 0.70, h2h_model: 0.35, h2h_gold: 0.47}
    by_source_distill_small:
      claude_cli:         {faithful: 1.60, specific: 1.56, coherent: 0.70}
      copilot_cli_native: {faithful: 1.52, specific: 1.34, coherent: 0.56}  # weak locus inherited
  finding: >-
    Seq-KD into flan-t5-small (90MB, ships at 276ms/seg one CPU core per
    titler-small-capacity) TRANSFERS the teacher's FAITHFULNESS almost fully:
    student faithful 1.56 vs teacher 1.57, vs 1.50 real-gold-small and 1.43
    tiny-anchor (+0.13 over anchor). h2h approaches the teacher (student 33/50 vs
    teacher 35/47). This is the payoff of the whole ladder: FAITHFULNESS -- the one
    axis NO lever (data/capacity/decoding/input) ever moved for a CPU-tier model --
    is now shippable at 90MB by borrowing a summarization teacher's decodes. The
    TINY student does NOT absorb it (faithful 1.42 = anchor 1.43): 16M lacks the
    capacity to fit the teacher distribution -- distillation is capacity-gated. The
    residual student weakness is the teacher's OWN weak locus (copilot specific 1.34
    / coherent 56), inherited faithfully -- not a distillation artifact.
  verdict: >-
    SHIP PATH FOUND. distill-small (flan-t5-small seq-KD from distilbart-xsum) is the
    best CPU-shippable titler to date: faithful 1.56 (teacher-parity) at 90MB / one
    core. It clears the faithfulness wall the tiny model never could. It does NOT
    reach the teacher's 70% coherence (student 63%) -- that needs the 306M capacity
    that cannot ship. Distillation is capacity-gated: small absorbs the teacher,
    tiny does not. Remaining gap = copilot specificity (inherited from teacher).
  next: >-
    (1) Promote distill-small to the serve artifact (int8 ONNX via _title_export;
    T5 arch so the existing torch-free serve loop runs unchanged) + pipebench to
    confirm the 90MB/276ms/one-core footprint holds with teacher-distilled weights.
    (2) Attack the residual copilot-specificity locus at the TEACHER (improving the
    teacher lifts the ceiling the student distills toward). (3) Optional: a mid
    student (t5-base 220M) to test whether more student capacity recovers the
    teacher's coherence, if its footprint still clears the mandate.


# ----------------------------------------------------------------------------
# DOES THE SPAN SEQ-KD WIN TRANSFER TO THE SESSION-NAMING (request->title) HEAD?
# The ship path above is proven for the SPAN head. The session/request head is
# the weak one (leak-free shipped = 9% coherent). Two questions, in order:
# (1) zero-shot: does the span-distilled flan-t5-small already serve session
#     naming? (2) if not, does a DEDICATED session-naming seq-KD arm (teacher
#     re-trained on the request dataset -> flan-t5-small student) break the wall?
# Eval is the content-hash CLEAN heldout of the 260 CodePlane reals (the 91 never-
# trained prompts; same partition as titler-request-dedicated.yaml), REAL gold,
# same _title_judge Sonnet rubric. Probe = _title_session_probe.py (the exact
# _REQUEST_PREFIX serve path, grounding off, over the int8 ONNX student).
session_naming_transfer:
  zero_shot_span_distill_small:            # span-KD small applied AS-IS to session naming
    date: 2026-07-03
    preds: preds-session-distill-small.parquet
    scores: {coherent: 0.15, faithful: 0.65, specific: 0.88, fluent: 1.74, h2h_model: 0.05, h2h_tie: 0.02, h2h_gold: 0.93, n: 260}
    gold_ceiling: {coherent: 0.91, faithful: 1.86}
    finding: >-
      NO TRANSFER. The span faithfulness win (1.56 on spans) COLLAPSES to 0.65 on
      session naming -- barely above the 0.62 shipped head. The span head and the
      request head are different distributions; a span-distilled student is floor-
      level zero-shot on prompts. Confirms session naming needs its OWN arm.
  dedicated_session_kd_small:              # distilbart-xsum RE-TRAINED on the request dataset -> flan-t5-small seq-KD student
    date: 2026-07-04
    dataset: t5-title-request-diverse.parquet   # 12,260 rows (12k synth-request + 260 CodePlane reals); 12,169 train / 91 clean heldout
    pipeline: teacher train -> seq-KD decode -> flan-t5-small student -> int8 ONNX -> probe on 91 heldout -> local judge
    student: google/flan-t5-small (90MB int8)   # t5-title-request-distill-small-onnx/
    preds: preds-session-kd-small.parquet
    scores: {coherent: 0.41, faithful: 1.18, specific: 1.47, fluent: 1.68, verb_obj_distinct: 0.91, h2h_model: 0.13, h2h_tie: 0.14, h2h_gold: 0.73, n: 91}
    gold_ceiling: {coherent: 0.95, faithful: 1.87, specific: 1.90}
    clean_baseline_same_heldout:           # the honest comparator -- SAME content-hash clean partition
      dedicated_t5_tiny_diverse: {coherent: 0.39, faithful: 1.21, h2h_model: 0.10, h2h_tie: 0.14, h2h_gold: 0.76, n: 80, footprint: ~31MB}
      # source: titler-request-dedicated.yaml results.diverse_12k_plus_real_anchor_no_rationale
    finding: >-
      TIE, NOT A WIN. On the identical clean heldout the seq-KD flan-t5-small
      student (41% coherent / 1.18 faithful / 90MB) MATCHES the already-recorded
      dedicated t5-tiny diverse model (39% / 1.21 / ~31MB) within the 2.5pt judge
      noise floor -- at 3x the footprint. The 41% only beats the WEAK comparators
      (9% shipped SWE-bench-OOD, 15% zero-shot span-KD). Unlike the span head
      (seq-KD gave +0.13 faithful over the tiny anchor), seq-KD delivers NO
      footprint-justified gain for the session-naming head: a 90MB distilled
      student does not beat a 16M model trained directly on real gold + diverse
      synth. The faithfulness wall the span head BROKE (1.43 -> 1.56) does NOT
      break here -- both dedicated approaches plateau at ~1.2, and h2h stays ~73-76%
      losses to gold. Slight h2h edge (13/14/73 vs 10/14/76) is inside noise.
  verdict: >-
    Session naming is NOT solved and seq-KD is NOT its lever. The request/session
    head sits at ~40% coherent / ~1.2 faithful across BOTH dedicated arms (direct-
    train tiny and seq-KD small), a hard plateau ~2x under the 95% gold ceiling.
    Capacity is not the bind (90MB small ties 31MB tiny); the seq-KD teacher-target
    trick that unlocked the span head does not transfer. The remaining honest gap
    is the request DISTRIBUTION itself (spoken/rambling CodePlane prompts vs terse
    span ctx) -- not student size, not distillation.
  next: >-
    (1) Do NOT promote distill-small for the request head -- it is a footprint
    regression at parity quality; the ~31MB tiny diverse model is the better clean
    point if any dedicated head ships. (2) To move the ~1.2 faithfulness wall,
    attack the TEACHER for the request register (the span teacher was distilbart-
    xsum on span ctx; a request teacher wants request-shaped summarization signal
    -- rationale-augmented or a stronger backbone) rather than growing the student.
    (3) Land a fresh IN-REGISTER real eval (held-out Copilot report_intent gerund
    pairs neither head trained on) so future request-head numbers stop leaning on
    the leak-inflated CodePlane 260 and the out-of-register SWE-bench floor.
  artifacts: >-
    gitignored (data/interim): t5-title-request-distill-small-onnx/,
    preds-session-kd-small.parquet, preds-session-distill-small.parquet,
    title-judge-scores-session-kd-small.jsonl,
    title-judge-scores-session-distill-small.jsonl. Committed: the probe/train
    scripts + this record.
