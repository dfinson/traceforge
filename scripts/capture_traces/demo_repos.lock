# Vendored demo-repo snapshots used as the substrate for raw-trace capture.
#
# Each raw trace under tests/fixtures/raw_traces/<framework>/ is produced by
# running that framework's agent (real paid model) against one of these demo
# repos on scripts/capture_traces/_repo_task.py::CANONICAL_TASK. The repos are
# FIRST-PARTY demo content (CodePlane demos) — committed fixtures never contain
# real-world or third-party code.
#
# Snapshots are frozen `git archive HEAD` trees (no .git) vendored under
# tests/fixtures/demo_repos/<repo>/. To refresh: re-archive at a new SHA, update
# the pin here, then re-run the affected capture_<framework>.py scripts.
#
