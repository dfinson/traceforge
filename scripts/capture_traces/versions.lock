# Pinned framework versions for raw-trace capture.
#
# Each row is the latest-stable version a trace was (or should be) captured
# against. Update the version here when you re-capture after an upstream
# release, then re-run the matching capture_<framework>.py and commit the
# refreshed trace + meta.yaml.
#
# tier=sdk     -> Python SDK; can be driven with a fake/test model at zero cost
# tier=cli     -> CLI/desktop app writing session files; run a real session,
#                 then harvest the on-disk file (needs auth + a few $ of tokens)
# tier=derived -> produced from a parent framework's run (no separate capture)
#
# framework        tier      package / source                     pin
