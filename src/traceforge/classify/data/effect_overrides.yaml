      # Read-only verbs
      list: read_only
      show: read_only
      get: read_only
      check: read_only
      wait: read_only
      exists: read_only
      browse: read_only
      export: read_only
      query: read_only
      download: read_only
      generate: read_only
      # Mutating verbs
      create: mutating
      update: mutating
      set: mutating
      start: mutating
      stop: mutating
      restart: mutating
      scale: mutating
      import: mutating
      assign: mutating
      move: mutating
      lock: mutating
      unlock: mutating
      configure: mutating
      connect: mutating
      enable: mutating
      disable: mutating
      rotate: mutating
      upgrade: mutating
      add: mutating
      renew: mutating
      failover: mutating
      swap: mutating
      resize: mutating
      restore: mutating
      recover: mutating
      accept: mutating
      invoke: mutating
      apply: mutating
      attach: mutating
      migrate: mutating
      convert: mutating
      redeploy: mutating
      reimage: mutating
      generalize: mutating
      capture: mutating
      provision: mutating
      deploy: mutating
      push: mutating
      publish: mutating
      upload: mutating
      up: mutating
      build: mutating
      run: mutating
      detach: mutating
      login: read_only
      logout: read_only
      account: read_only
      # Destructive verbs
      delete: destructive
      purge: destructive
      remove: destructive
      clear: destructive
      revoke: destructive
      deallocate: mutating
      deactivate: destructive
      cancel: destructive
      abort: destructive
      force-delete: destructive
      unbind: destructive

  gcloud:
    verb_prefix_effects:
      # Read-only verbs
      list: read_only
      ls: read_only
      cat: read_only
      describe: read_only
      get-iam-policy: read_only
      info: read_only
      export: read_only
      get: read_only
