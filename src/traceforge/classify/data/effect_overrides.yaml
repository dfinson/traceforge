      add: mutating
      scale: mutating
      restore: mutating
      rotate: mutating
      encrypt: mutating
      allocate: mutating
      assign: mutating
      authorize: mutating
      accept: mutating
      invoke: mutating
      send: mutating
      publish: mutating
      subscribe: mutating
      confirm: mutating
      run: mutating
      execute: mutating
      submit: mutating
      reset: mutating
      move: mutating
      upgrade: mutating
      renew: mutating
      replace: mutating
      configure: mutating
      connect: mutating
      provision: mutating
      activate: mutating
      resume: mutating
      pause: mutating
      protect: mutating
      unprotect: mutating
      assume: mutating
      cp: mutating
      mv: mutating
      mb: mutating
      sync: mutating
      deploy: mutating
      push: mutating
      upload: mutating
      change: mutating
      # Destructive verbs
      delete: destructive
      batch-delete: destructive
      terminate: destructive
      remove: destructive
      purge: destructive
      destroy: destructive
      revoke: destructive
      deregister: destructive
      cancel: destructive
      abort: destructive
      reject: destructive
      force-delete: destructive
      empty: destructive
      release: destructive
      rm: destructive
      rb: destructive

  az:
