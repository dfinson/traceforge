# VS Code Copilot Chat — YAML mapping for traceforge
#
# Native source: VS Code's ChatModel journal, persisted line-by-line at
#   %APPDATA%/Code/User/workspaceStorage/<hash>/chatSessions/<sessionId>.jsonl
# (version 3). Each line is a {kind, k, v} journal record. The `copilot_vscode`
# preprocessor replays the journal and expands each record into typed flat
# events keyed by `event_type` (see preprocessors/copilot_vscode.py).
#
# This is DISTINCT from copilot.yaml (the standalone Copilot CLI's
# ~/.copilot/session-state/<id>/events.jsonl stream) and from
# copilot_markdown.yaml (the CLI/editor session-store.db turns fallback).

framework: copilot_vscode
framework_version: "vscode-chat-v3"
ingestion_mode: file_watch
type_field: event_type
timestamp_field: timestamp
preprocessor: copilot_vscode
default_kind: raw

motivation:
  sources:
    - events: ["assistant_text"]
      field: content
      role: intent
    - events: ["thinking"]
      field: content
      role: reasoning
  targets: ["tool.call.completed"]

events:
  # ── Session lifecycle ──────────────────────────────────────────────────────
  session_started:
    kind: session.started
    payload:
      session_id: session_id
      version: version
      responder: responder
      initial_location: initial_location

  # ── Messages ───────────────────────────────────────────────────────────────
  user_message:
    kind: message.user
    payload:
      content: text
      request_id: request_id
      model: model
      agent: agent

  # Markdown content parts (no `kind` discriminator) = assistant prose.
  assistant_text:
    kind: message.assistant
    payload:
      content: value
      request_id: request_id
      model: model

  thinking:
    kind: reasoning.started
    payload:
      content: value
      reasoning_id: id
      request_id: request_id

  # ── Tool invocations ───────────────────────────────────────────────────────
  # VS Code serializes the COMPLETED invocation (isComplete, results inline).
  toolInvocationSerialized:
    kind: tool.call.completed
    payload:
      tool_call_id: toolCallId
      tool_name: toolId
      invocation: invocationMessage.value
      success: isComplete
      command: toolSpecificData.commandLine
      cwd: toolSpecificData.cwd
      output: toolSpecificData.terminalCommandOutput
      source: source.label
      request_id: request_id
      model: model

  # ── File / edit surfaces ───────────────────────────────────────────────────
  textEditGroup:
    kind: file.edited
    payload:
      uri: uri
      request_id: request_id

  codeblockUri:
    kind: file.read
    payload:
      uri: uri
      request_id: request_id

  inlineReference:
    kind: file.read
    payload:
      reference: inlineReference
      request_id: request_id

  # ── MCP ────────────────────────────────────────────────────────────────────
  mcpServersStarting:
    kind: mcp.connection.started
    payload:
      request_id: request_id

  # ── Edit checkpoints ───────────────────────────────────────────────────────
  undoStop:
    kind: checkpoint.created
    payload:
      undo_stop_id: id
      request_id: request_id

  # ── Additional VS Code chat part kinds ─────────────────────────────────────
  # Proactively mapped (observed across VS Code chat versions but absent from the
  # local dev sessions) so a one-shot paid capture won't trip the drift guard on
  # a part type that simply didn't occur here. Missing nested fields resolve to
  # None, so a sparse payload is harmless.
  progressTaskSerialized:
    kind: tool.progress
    payload:
      request_id: request_id

  progressMessage:
    kind: tool.progress
    payload:
      request_id: request_id

  # `steering` is intentionally NOT mapped: in microsoft/vscode it is a
  # ChatRequestQueueKind (request-queue state), not a member of the IChatProgress
  # response-part union, so it never appears as a part `kind`. The preprocessor's
  # _emit_part derives event_type strictly from a progress part's `kind`
  # (copilot_vscode.py), so a `steering` event can never be emitted — mapping it
  # here would be dead config. See issue #172.

  command:
    kind: command.started
    payload:
      command: command.commandId
      request_id: request_id

  warning:
    kind: session.warning
    payload:
      content: value
      request_id: request_id

  confirmation:
    kind: permission.requested
    payload:
      request_id: request_id

  codeCitation:
    kind: file.read
    payload:
      uri: value
      request_id: request_id

  markdownContent:
    kind: message.assistant
    payload:
      content: value
      request_id: request_id
      model: model

  treeData:
    kind: tool.output
    payload:
      request_id: request_id

  notebookEditGroup:
    kind: file.edited
    payload:
      uri: uri
      request_id: request_id

  # ── Per-request completion ─────────────────────────────────────────────────
  request_result:
    kind: llm.call.completed
    payload:
      request_id: request_id
      model: model
      first_progress_ms: first_progress_ms
      duration_ms: total_elapsed_ms
