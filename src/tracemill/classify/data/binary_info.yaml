# Binary metadata - role and default effect for known CLI binaries.
# Used by shell classification to determine effect and role when
# no specific rule matches.
#
# IMPORTANT: role values MUST match CodingRole enum values in coding.py.
# Valid prefixes: validator.*, transformer.*, generator.*, executor.*,
# orchestrator.*, observer.*, retriever.*, modifier.*, persistence.*,
# communicator.*

