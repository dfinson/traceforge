    default_effect: mutating
  chown:
    role: orchestrator.script_runner
    default_effect: mutating
  touch:
    role: filesystem.file_editor
    default_effect: mutating
  ln:
    role: filesystem.file_editor
    default_effect: mutating
  sudo:
    role: orchestrator.script_runner
    default_effect: null

  # ─── Text processors / search ──────────────────────────────────────────────
  sed:
    role: filesystem.search_index
    default_effect: read_only
  awk:
    role: filesystem.search_index
    default_effect: read_only
  gawk:
    role: filesystem.search_index
    default_effect: read_only
  jq:
    role: filesystem.search_index
    default_effect: read_only
  yq:
    role: filesystem.search_index
    default_effect: read_only
  cat:
    role: filesystem.file_browser
    default_effect: read_only
  head:
    role: filesystem.file_browser
    default_effect: read_only
  tail:
    role: filesystem.file_browser
    default_effect: read_only
  less:
    role: filesystem.file_browser
    default_effect: read_only
  grep:
    role: filesystem.search_index
    default_effect: read_only
  rg:
    role: filesystem.search_index
    default_effect: read_only
  ag:
    role: filesystem.search_index
    default_effect: read_only
  fd:
    role: filesystem.file_browser
    default_effect: read_only
  fdfind:
    role: filesystem.file_browser
    default_effect: read_only

  # ─── Security scanners ────────────────────────────────────────────────────
  bandit:
    role: validator.security_scanner
    default_effect: read_only
  semgrep:
    role: validator.security_scanner
    default_effect: read_only
  trivy:
    role: validator.security_scanner
    default_effect: read_only
  snyk:
    role: validator.security_scanner
    default_effect: read_only
    network: true
  safety:
    role: validator.security_scanner
    default_effect: read_only
