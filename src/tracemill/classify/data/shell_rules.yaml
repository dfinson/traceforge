  git: { role: persistence.version_control }
  gh: { role: retriever.api_client, network: true }
  make: { role: orchestrator.task_runner }
  cmake: { role: validator.build_checker, default_effect: mutating }
  ninja: { role: validator.build_checker, default_effect: mutating }
  bazel: { role: validator.build_checker }
  gradle: { role: orchestrator.task_runner }
  mvn: { role: orchestrator.task_runner }
  webpack: { role: transformer.bundler, default_effect: mutating }
  vite: { role: transformer.bundler }
  dotnet: { role: orchestrator.task_runner }
  go: { role: orchestrator.task_runner }
  python: { role: executor.script_runner }
  python3: { role: executor.script_runner }
  node: { role: executor.script_runner }
  curl: { role: retriever.api_client, default_effect: read_only, network: true }
  wget: { role: retriever.api_client, default_effect: mutating, network: true }
  rm: { role: executor.script_runner, default_effect: destructive, destructive: true }
  rmdir: { role: executor.script_runner, default_effect: destructive, destructive: true }
  sudo: { role: executor.script_runner }
  choco: { role: orchestrator.package_manager, default_effect: mutating, network: true }
  winget: { role: orchestrator.package_manager, default_effect: mutating, network: true }
  scoop: { role: orchestrator.package_manager, default_effect: mutating, network: true }
  sed: { role: retriever.search_index, default_effect: read_only }
  awk: { role: retriever.search_index, default_effect: read_only }
  gawk: { role: retriever.search_index, default_effect: read_only }
  jq: { role: retriever.search_index, default_effect: read_only }
  yq: { role: retriever.search_index, default_effect: read_only }
  perl: { role: executor.script_runner }
  cp: { role: modifier.file_editor, default_effect: mutating }
  mv: { role: modifier.file_editor, default_effect: mutating }
  mkdir: { role: modifier.file_editor, default_effect: mutating }
  chmod: { role: executor.script_runner, default_effect: mutating }
  chown: { role: executor.script_runner, default_effect: mutating }
  touch: { role: modifier.file_editor, default_effect: mutating }
  ln: { role: modifier.file_editor, default_effect: mutating }
  cat: { role: retriever.file_browser, default_effect: read_only }
  head: { role: retriever.file_browser, default_effect: read_only }
  tail: { role: retriever.file_browser, default_effect: read_only }
  less: { role: retriever.file_browser, default_effect: read_only }
  grep: { role: retriever.search_index, default_effect: read_only }
  rg: { role: retriever.search_index, default_effect: read_only }
  ag: { role: retriever.search_index, default_effect: read_only }
  fd: { role: retriever.file_browser, default_effect: read_only }
  fdfind: { role: retriever.file_browser, default_effect: read_only }
  bandit: { role: validator.security_scanner, default_effect: read_only }
  semgrep: { role: validator.security_scanner, default_effect: read_only }
  trivy: { role: validator.security_scanner, default_effect: read_only }
  snyk: { role: validator.security_scanner, default_effect: read_only, network: true }
  safety: { role: validator.security_scanner, default_effect: read_only, network: true }
  conda: { role: orchestrator.package_manager, network: true }
  virtualenv: { role: orchestrator.package_manager, default_effect: mutating }
  nvm: { role: orchestrator.package_manager, default_effect: mutating }
  rbenv: { role: orchestrator.package_manager, default_effect: mutating }
  pyenv: { role: orchestrator.package_manager, default_effect: mutating }
  az: { role: retriever.api_client, network: true }
  aws: { role: retriever.api_client, network: true }
  gcloud: { role: retriever.api_client, network: true }

npm_verify_scripts: [build, check, lint, test, tests, typecheck]
interpreter_verify_modules: [mypy, pyright, pytest, ruff, unittest]

transparent_wrappers: [command, env, exec, nice, nohup, stdbuf, sudo, timeout]

git_subcmd_actions:
  commit: persist.commit
  push: deliver.push
  merge: persist.merge
  rebase: persist.rebase
  cherry-pick: persist.merge
  tag: persist.stage
  reset: modify.edit
  stash: persist.stage
  diff: retrieve.diff
  log: retrieve.browse
  status: retrieve.browse
  show: retrieve.read
  blame: retrieve.read
  branch: retrieve.browse
  checkout: execute.run_script
  switch: execute.run_script
  fetch: retrieve.read
  pull: retrieve.read
  clone: retrieve.read
  add: persist.stage

verification_role_actions:
  validator.linter: validate.lint
  validator.test_runner: validate.test
  validator.type_checker: validate.typecheck
  validator.security_scanner: validate.security_scan
  validator.build_checker: validate.build_check
  transformer.formatter: validate.lint
  transformer.bundler: validate.build_check

activity_defaults:
  verification:
    action: validate.test
    scope: artifact.test_code
    phase: verification
  setup:
    action: persist.install
    scope: artifact.dependency
    phase: implementation
  delivery:
    action: persist.commit
    scope: state.repository
    phase: review
  investigation:
    action: retrieve.read
    scope: artifact.source_code
    phase: exploration
  implementation:
    action: execute.run_script
    scope: artifact.source_code
    phase: implementation
