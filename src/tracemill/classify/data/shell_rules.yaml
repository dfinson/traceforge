# Shell command classification rules and binary metadata.
# Rules are evaluated in order — first match wins.

shell_rules:
  - id: pip-pip3-install
    binaries: [pip, pip3]
    subcmds: [install]
    activity: setup
    role: orchestrator.package_manager
    effect: mutating

  - id: npm-pnpm-yarn-add-ci-install
