# Aider event mapping for MappedJsonAdapter
# Targets: aider >= 0.70 (structured JSON events in .aider.events.json)
# Source: paul-gauthier/aider event logging format.
# Note: Aider's primary logs are markdown (.aider.chat.history.md) which
# require a separate MarkdownPreParser before feeding into this adapter.

framework: aider
framework_version: ">=0.70"
ingestion_mode: file_watch
type_field: event
timestamp_field: timestamp

events:
  # ── Message events ──
  message_send:
    kind: message.user
    payload:
      content: content
      role: role
  message_received:
    kind: message.assistant
    payload:
      content: content
      model: model

  # ── LLM calls ──
  llm_start:
    kind: llm.call.started
    payload:
      model: model
      input_tokens: input_tokens
  llm_completion:
    kind: llm.call.completed
    payload:
      model: model
      input_tokens: input_tokens
      output_tokens: output_tokens
      cost: cost
  llm_error:
    kind: llm.call.failed
    payload:
      error: error
      model: model

  # ── File operations ──
  file_edit:
    kind: file.edited
    payload:
      path: fname
      content: content
  file_add:
    kind: file.created
    payload:
      path: fname
  file_drop:
    kind: file.deleted
    payload:
      path: fname

  # ── Commands ──
  command_run:
    kind: command.started
    payload:
      command: command
  command_output:
    kind: command.completed
    payload:
      content: output
      exit_code: exit_code

  # ── Git operations ──
  git_commit:
    kind: tool.call.completed
    payload:
      tool_name: git
      result: commit_hash
      message: commit_message
  git_diff:
    kind: file.read
    payload:
      content: diff

  # ── Linting / testing ──
  lint_run:
    kind: tool.call.started
    payload:
      tool_name: linter
      arguments: files
  lint_result:
    kind: tool.call.completed
    payload:
      tool_name: linter
      result: output
      success: passed
  test_run:
    kind: tool.call.started
    payload:
      tool_name: test_runner
      arguments: command
  test_result:
    kind: tool.call.completed
    payload:
      tool_name: test_runner
      result: output
      success: passed

  # ── Repo map ──
  repo_map:
    kind: knowledge.query.completed
    payload:
      content: map_content

  # ── Architect mode ──
  architect_plan:
    kind: planning.started
    payload:
      content: plan
  architect_edit:
    kind: planning.completed
    payload:
      content: edits

  # ── Session ──
  session_start:
    kind: session.started
    payload:
      model: main_model
      cwd: cwd
  session_end:
    kind: session.ended
    payload: {}

  # ── Errors ──
  error:
    kind: session.error
    payload:
      message: message
