# Cline / Roo Code event mapping for MappedJsonAdapter
# Targets: cline >= 3.0 (VS Code extension globalStorage JSON format)
# Source: cline/cline VS Code extension storage format.

framework: cline
framework_version: ">=3.0"
ingestion_mode: file_watch
type_field: type
timestamp_field: ts

events:
  # ── Messages ──
  say:
    kind: message.assistant
    payload:
      content: text
      say_type: say
  ask:
    kind: input.requested
    payload:
      content: text
      ask_type: askType
  user_feedback:
    kind: input.received
    payload:
      content: text

  # ── Tool operations ──
  tool_use:
    kind: tool.call.started
    payload:
      tool_name: tool
      tool_call_id: ts
      arguments: content
  tool_result:
    kind: tool.call.completed
    payload:
      tool_call_id: tool_use_ts
      result: content
      success: approved

  # ── Command execution ──
  command:
    kind: command.started
    payload:
      command: text
  command_output:
    kind: command.completed
    payload:
      content: text
      exit_code: exitCode

  # ── File operations ──
  write_to_file:
    kind: file.edited
    payload:
      path: path
      content: content
  read_file:
    kind: file.read
    payload:
      path: path
  replace_in_file:
    kind: file.edited
    payload:
      path: path
      old_str: search
      new_str: replace
  search_files:
    kind: file.read
    payload:
      path: path
      content: regex
  list_files:
    kind: file.read
    payload:
      path: path

  # ── Browser ──
  browser_action:
    kind: browser.action
    payload:
      action: action
      url: url
  browser_result:
    kind: browser.result
    payload:
      content: text
      url: url

  # ── API/LLM ──
  api_req_started:
    kind: llm.call.started
    payload:
      model: model
      input_tokens: tokensIn
  api_req_finished:
    kind: llm.call.completed
    payload:
      model: model
      input_tokens: tokensIn
      output_tokens: tokensOut
      cost: cost
      cache_read_tokens: cacheReads
      cache_write_tokens: cacheWrites

  # ── MCP ──
  mcp_server_request:
    kind: mcp.connection.started
    payload:
      server_name: serverName
      tool_name: toolName
  mcp_server_response:
    kind: mcp.connection.completed
    payload:
      server_name: serverName
      result: content

  # ── Completion / session ──
  completion_result:
    kind: session.ended
    payload:
      output: text
      command: command

  # ── Errors ──
  error:
    kind: error
    payload:
      message: text
