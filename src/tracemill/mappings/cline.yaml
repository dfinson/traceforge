# Cline / Roo Code event mapping for MappedJsonAdapter
# Targets: cline >= 3.0 (VS Code extension globalStorage JSON format)
# Source: cline/cline apps/vscode/src/shared/ExtensionMessage.ts
#
# IMPORTANT: Real Cline uses a COMPOUND discriminator:
#   - type_field "type" has ONLY two values: "ask" or "say"
#   - The actual sub-type is in the "ask" or "say" field:
#     {type: "say", say: "api_req_started", text: JSON.stringify({tokensIn, tokensOut, cost})}
#     {type: "ask", ask: "tool", text: JSON.stringify({tool, path})}
#
# The flat type_field approach correctly maps "ask" and "say" to broad categories.
# However, fine-grained events (api_req_started, tool, command, etc.) are SUBTYPES
# that appear as values in the "say"/"ask" field, NOT as "type" field values.
#
# Events like "api_req_started" in this YAML will NEVER fire against real Cline data
# because type is always "ask" or "say". They are here for ClinePreProcessor output
# that flattens: {type: "say", say: "api_req_started"} → {type: "api_req_started"}.
#
# Real ClineMessage structure:
#   {ts: number, type: "ask"|"say", ask?: ClineAsk, say?: ClineSay, text?: string, ...}
# API metrics: JSON.parse(text) on say="api_req_started" → {tokensIn, tokensOut, cost}
# Tool info: JSON.parse(text) on say="tool" → {tool, path, content, diff}

framework: cline
framework_version: ">=3.0"
ingestion_mode: file_watch
type_field: type
timestamp_field: ts

events:
  # ── Messages ──
  say:
    kind: message.assistant
    payload:
      content: text
      say_type: say
  ask:
    kind: input.requested
    payload:
      content: text
      ask_type: askType
  user_feedback:
    kind: input.received
    payload:
      content: text

  # ── Tool operations ──
  tool_use:
    kind: tool.call.started
    payload:
      tool_name: tool
      tool_call_id: ts
      arguments: content
  tool_result:
    kind: tool.call.completed
    payload:
      tool_call_id: tool_use_ts
      result: content
      success: approved

  # ── Command execution ──
  command:
    kind: command.started
    payload:
      command: text
  command_output:
    kind: command.completed
    payload:
      content: text
      exit_code: exitCode

  # ── File operations ──
  write_to_file:
    kind: file.edited
    payload:
      path: path
      content: content
  read_file:
    kind: file.read
    payload:
      path: path
  replace_in_file:
    kind: file.edited
    payload:
      path: path
      old_str: search
      new_str: replace
  search_files:
    kind: file.read
    payload:
      path: path
      content: regex
  list_files:
    kind: file.read
    payload:
      path: path

  # ── Browser ──
  browser_action:
    kind: browser.action
    payload:
      action: action
      url: url
  browser_result:
    kind: browser.result
    payload:
      content: text
      url: url

  # ── API/LLM ──
  api_req_started:
    kind: llm.call.started
    payload:
      model: model
      input_tokens: tokensIn
  api_req_finished:
    kind: llm.call.completed
    payload:
      model: model
      input_tokens: tokensIn
      output_tokens: tokensOut
      cost_usd: cost
      cache_read_tokens: cacheReads
      cache_write_tokens: cacheWrites

  # ── Telemetry (from API request totals) ──
  api_usage:
    kind: telemetry.usage
    payload:
      input_tokens: tokensIn
      output_tokens: tokensOut
      cost_usd: cost
      model: model

  # ── MCP ──
  mcp_server_request:
    kind: mcp.connection.started
    payload:
      server_name: serverName
      tool_name: toolName
  mcp_server_response:
    kind: mcp.connection.completed
    payload:
      server_name: serverName
      result: content

  # ── Completion / session ──
  completion_result:
    kind: session.ended
    payload:
      output: text
      command: command

  # ── Errors ──
  error:
    kind: session.error
    payload:
      message: text
