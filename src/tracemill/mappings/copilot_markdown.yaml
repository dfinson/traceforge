# Copilot Markdown Pre-Parser output mapping for MappedJsonAdapter
# Maps event dicts emitted by CopilotPreParser → canonical event kinds.
#
# Two input modes:
#   1. parse_turn() output: events from SQLite turns table (rendered markdown)
#   2. parse_log_line() output: events from process-*.log (raw API messages)
#
# The parse_turn() path gives medium-fidelity events (tool calls embedded in text).
# The parse_log_line() path gives FULL-fidelity events (raw API tool_use/tool_result).

framework: copilot_markdown
framework_version: ">=1.0"
ingestion_mode: sqlite
type_field: type
timestamp_field: timestamp

motivation:
  sources:
    - events: ["assistant_text", "api_assistant_text"]
      field: content
      role: intent

events:
  # ── From parse_turn(): SQLite turns table ──

  user_message:
    kind: message.user
    payload:
      content: content
      turn_index: turn_index

  assistant_text:
    kind: message.assistant
    payload:
      content: content

  tool_call:
    kind: tool.call.started
    payload:
      tool_name: tool_name
      input: command

  code_block:
    kind: tool.output
    payload:
      language: language
      content: content

  structured_output:
    kind: tool.output
    payload:
      format: format
      data: data

  section_heading:
    kind: session.info
    payload:
      level: level
      title: title

  table_output:
    kind: tool.output
    payload:
      content: content

  quoted_output:
    kind: tool.output
    payload:
      content: content

  # ── From parse_log_line(): Process log API messages ──

  api_user_text:
    kind: message.user
    payload:
      content: content
      role: role

  api_assistant_text:
    kind: message.assistant
    payload:
      content: content
      role: role

  api_tool_use:
    kind: tool.call.started
    payload:
      tool_use_id: tool_use_id
      tool_name: tool_name
      input: input

  api_tool_result:
    kind: tool.call.completed
    payload:
      tool_use_id: tool_use_id
      result: content

  # ── Telemetry and session events (from process log) ──

  telemetry:
    kind: telemetry.usage
    payload:
      event_name: event_name
      kind: kind

  session_event:
    kind: session.info
    payload:
      session_id: session_id
      event_name: event_name
