# CrewAI event mapping for MappedJsonAdapter
# Targets: crewai >= 0.86 (Flow events via blinker Signal)
# Source: crewAI-inc/crewAI src/crewai/flow/flow_events.py
#
# IMPORTANT: CrewAI v0.86 only emits 4 Flow lifecycle events.
# Agent/Task/LLM/Tool events are NOT emitted as subscribable JSON events.
# Token usage is only accessible post-run via crew.usage_metrics.
# The fictional "AgentExecutionStartedEvent" etc. below are ASPIRATIONAL
# mappings for a future version that may expose these as events.
#
# Real events use snake_case type values from dataclasses.asdict():
#   flow_started, flow_finished, method_execution_started, method_execution_finished

framework: crewai
framework_version: ">=0.86"
ingestion_mode: file_watch
type_field: type
timestamp_field: timestamp

events:
  # ── REAL Flow events (confirmed in source) ──
  flow_started:
    kind: workflow.started
    payload:
      flow_name: flow_name
  flow_finished:
    kind: workflow.completed
    payload:
      flow_name: flow_name
      output: result
  method_execution_started:
    kind: task.started
    payload:
      flow_name: flow_name
      task_name: method_name
  method_execution_finished:
    kind: task.completed
    payload:
      flow_name: flow_name
      task_name: method_name
      output: result

  # ── ASPIRATIONAL: These events do NOT exist in crewai v0.86.
  # They are mapped in case a future version adds an event bus.
  # The weekly CI audit will detect when/if these become real. ──

  AgentExecutionStartedEvent:
    kind: agent.spawned
    payload:
      agent_id: agent_id
      agent_role: agent_role
      task_name: task_name
  AgentExecutionCompletedEvent:
    kind: agent.completed
    payload:
      agent_id: agent_id
      agent_role: agent_role
      output: output
  AgentExecutionErrorEvent:
    kind: agent.failed
    payload:
      agent_id: agent_id
      error: error

  # ── Task lifecycle (aspirational) ──
  TaskStartedEvent:
    kind: task.started
    payload:
      task_id: task_id
      task_name: task_name
      agent_role: agent_role
  TaskCompletedEvent:
    kind: task.completed
    payload:
      task_id: task_id
      task_name: task_name
      output: output
  TaskFailedEvent:
    kind: task.failed
    payload:
      task_id: task_id
      error: error

  # ── Tool usage (aspirational) ──
  ToolUsageStartedEvent:
    kind: tool.call.started
    payload:
      tool_name: tool_name
      tool_call_id: event_id
      arguments: tool_input
  ToolUsageFinishedEvent:
    kind: tool.call.completed
    payload:
      tool_call_id: started_event_id
      tool_name: tool_name
      result: tool_output
      success: success
  ToolUsageErrorEvent:
    kind: tool.call.failed
    payload:
      tool_name: tool_name
      error: error

  # ── LLM calls (aspirational) ──
  LLMCallStartedEvent:
    kind: llm.call.started
    payload:
      model: model
      agent_role: agent_role
  LLMCallCompletedEvent:
    kind: llm.call.completed
    payload:
      model: model
      output: response
      input_tokens: token_usage.prompt_tokens
      output_tokens: token_usage.completion_tokens
  LLMCallFailedEvent:
    kind: llm.call.failed
    payload:
      error: error
      model: model

  # ── Crew lifecycle (aspirational) ──
  CrewStartedEvent:
    kind: session.started
    payload:
      crew_name: crew_name
  CrewCompletedEvent:
    kind: session.ended
    payload:
      crew_name: crew_name
      output: output
  CrewFailedEvent:
    kind: session.error
    payload:
      message: error

  # ── Delegation (aspirational) ──
  AgentDelegationStartedEvent:
    kind: agent.handoff
    payload:
      from_agent: from_agent_role
      to_agent: to_agent_role
      task: task_description
  AgentDelegationCompletedEvent:
    kind: agent.completed
    payload:
      from_agent: from_agent_role
      to_agent: to_agent_role
      output: output

  # ── Telemetry (aspirational) ──
  TokenUsageEvent:
    kind: telemetry.usage
    payload:
      input_tokens: prompt_tokens
      output_tokens: completion_tokens
      cost_usd: total_cost
      model: model
