# Goose event mapping for MappedJsonAdapter
# Targets: goose >= 1.0 (SQLite messages table, JSON-serialized rows)
# Source: block/goose crates/goose-providers/src/conversation/message.rs
#
# IMPORTANT: Real Goose only has TWO role values: "user" and "assistant".
# Tool calls are NESTED inside content_json as {"type": "toolRequest", ...}
# items within the assistant message array. They are NOT separate rows.
# Tool results are {"type": "toolResponse", ...} nested in user messages.
#
# The flat type_field: role approach can ONLY distinguish user/assistant.
# A GoosePreProcessor is needed to extract nested tool calls into separate events.
#
# Real schema: messages table columns:
#   id, message_id, session_id, role, content_json, created_timestamp, metadata_json
# Session table has: total_tokens, input_tokens, output_tokens, accumulated_cost

framework: goose
framework_version: ">=1.0"
ingestion_mode: poll
type_field: role
timestamp_field: created_at

events:
  # ── REAL messages (confirmed — these are the ONLY role values) ──
  user:
    kind: message.user
    payload:
      content: content_json
  assistant:
    kind: message.assistant
    payload:
      content: content_json

  # ── FICTIONAL roles below — these NEVER fire in real Goose.
  # Kept for forward compatibility if Goose adds a preprocessor layer.
  # The weekly CI audit will flag if these are still dead code. ──
  tool_use:
    kind: tool.call.started
    payload:
      tool_name: name
      tool_call_id: id
      arguments: input
  tool_result:
    kind: tool.call.completed
    payload:
      tool_call_id: tool_use_id
      result: content
      success: is_success

  # ── Session lifecycle (fictional — would need poll metadata) ──
  session_start:
    kind: session.started
    payload:
      model: model
      provider: provider
  session_end:
    kind: session.ended
    payload:
      reason: reason

  # ── Usage/cost (fictional — real data is on session table) ──
  usage:
    kind: telemetry.usage
    payload:
      input_tokens: input_tokens
      output_tokens: output_tokens
      cost_usd: cost_usd
      model: model
