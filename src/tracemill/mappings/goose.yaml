# Goose event mapping for MappedJsonAdapter
# Targets: goose >= 1.0 (SQLite messages table, JSON-serialized)
# Source: block/goose session storage format.
# Note: Goose stores messages in a SQLite DB. Use a poll-based ingestion
# that queries the messages table and feeds rows through this adapter.

framework: goose
framework_version: ">=1.0"
ingestion_mode: poll
type_field: role
timestamp_field: created_at

events:
  # ── Messages ──
  user:
    kind: message.user
    payload:
      content: content
  assistant:
    kind: message.assistant
    payload:
      content: content
  system:
    kind: message.system
    payload:
      content: content

  # ── Tool lifecycle ──
  tool_use:
    kind: tool.call.started
    payload:
      tool_name: name
      tool_call_id: id
      arguments: input
  tool_result:
    kind: tool.call.completed
    payload:
      tool_call_id: tool_use_id
      result: content
      success: is_success

  # ── Session lifecycle ──
  session_start:
    kind: session.started
    payload:
      model: model
      provider: provider
  session_end:
    kind: session.ended
    payload:
      reason: reason

  # ── File operations ──
  file_write:
    kind: file.edited
    payload:
      path: path
      content: content
  file_read:
    kind: file.read
    payload:
      path: path

  # ── Command execution ──
  shell_command:
    kind: command.started
    payload:
      command: command
  shell_output:
    kind: command.completed
    payload:
      content: output
      exit_code: exit_code

  # ── Errors ──
  error:
    kind: error
    payload:
      message: content
      error_type: type

  # ── Usage/cost ──
  usage:
    kind: usage
    payload:
      input_tokens: input_tokens
      output_tokens: output_tokens
      cost_usd: cost
      model: model
