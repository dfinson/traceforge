# LangGraph event mapping for MappedJsonAdapter
# Targets: langgraph >= 0.2 (astream_events version="v2")
# Source: langchain-ai/langchain libs/core/langchain_core/tracers/event_stream.py
#
# This is the BEST-FITTING YAML — LangGraph's astream_events(version="v2") emits
# flat dicts with exactly the structure our adapter expects:
#   {event, run_id, name, tags, metadata, data, parent_ids}
#
# Event names confirmed in source:
#   on_chain_start/end/stream, on_chat_model_start/stream/end,
#   on_tool_start/end/error, on_retriever_start/end, on_prompt_start/end
#
# NOTE: "on_llm_new_token" is an INTERNAL callback name that NEVER appears
# in astream_events v2 output. It becomes on_chat_model_stream or on_llm_stream.
# We map it anyway for on_llm_stream (non-chat model) compatibility.
#
# Token usage: on on_chat_model_end → data.output.usage_metadata =
#   {input_tokens, output_tokens, total_tokens}
# Model name: metadata.ls_model_name

framework: langgraph
framework_version: ">=0.2"
ingestion_mode: file_watch
type_field: event
timestamp_field: metadata.timestamp

events:
  # ── Chain/graph lifecycle ──
  on_chain_start:
    kind: workflow.started
    payload:
      run_id: run_id
      name: name
      inputs: data.input
  on_chain_end:
    kind: workflow.completed
    payload:
      run_id: run_id
      name: name
      output: data.output
  on_chain_error:
    kind: workflow.failed
    payload:
      run_id: run_id
      error: data.error

  # ── LLM calls ──
  on_llm_start:
    kind: llm.call.started
    payload:
      model: metadata.ls_model_name
      run_id: run_id
      input_tokens: metadata.ls_input_tokens
  on_llm_end:
    kind: llm.call.completed
    payload:
      model: metadata.ls_model_name
      run_id: run_id
      output: data.output.content
      input_tokens: metadata.ls_input_tokens
      output_tokens: metadata.ls_output_tokens
  on_llm_error:
    kind: llm.call.failed
    payload:
      run_id: run_id
      error: data.error
  on_llm_new_token:
    kind: llm.output.chunk
    payload:
      content: data.chunk

  # ── Chat model calls (modern LangGraph) ──
  on_chat_model_start:
    kind: llm.call.started
    payload:
      model: metadata.ls_model_name
      run_id: run_id
  on_chat_model_end:
    kind: llm.call.completed
    payload:
      model: metadata.ls_model_name
      run_id: run_id
      output: data.output.content
      input_tokens: data.output.usage_metadata.input_tokens
      output_tokens: data.output.usage_metadata.output_tokens
  on_chat_model_stream:
    kind: message.assistant.chunk
    payload:
      content: data.chunk.content

  # ── Tool calls ──
  on_tool_start:
    kind: tool.call.started
    payload:
      tool_name: name
      tool_call_id: run_id
      arguments: data.input
  on_tool_end:
    kind: tool.call.completed
    payload:
      tool_call_id: run_id
      tool_name: name
      result: data.output
  on_tool_error:
    kind: tool.call.failed
    payload:
      tool_call_id: run_id
      tool_name: name
      error: data.error

  # ── Retriever ──
  on_retriever_start:
    kind: knowledge.query.started
    payload:
      query: data.input.query
  on_retriever_end:
    kind: knowledge.query.completed
    payload:
      results: data.output

  # ── Node transitions (graph-specific) ──
  on_chain_stream:
    kind: workflow.completed
    payload:
      node: name
      data: data.chunk

  # ── Checkpoints ──
  on_checkpoint:
    kind: checkpoint.created
    payload:
      checkpoint_id: data.checkpoint_id
      thread_id: data.thread_id

  # ── Telemetry (from chat model usage metadata) ──
  on_chat_model_usage:
    kind: telemetry.usage
    payload:
      input_tokens: data.usage_metadata.input_tokens
      output_tokens: data.usage_metadata.output_tokens
      model: metadata.ls_model_name
