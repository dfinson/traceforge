# OpenCode event mapping for MappedJsonAdapter
# Targets: opencode >= 1.2, < 2.0 (SSE event stream from GET /event/subscribe)
# Source: anomalyco/opencode packages/core/src/session-event.ts (tag github-v1.2.24)
#         anomalyco/opencode packages/opencode/src/server/routes/instance/httpapi/handlers/event.ts
#         anomalyco/opencode packages/opencode/src/event-v2-bridge.ts
#
# Wire format: SSE text/event-stream, each message is event: "message", data: JSON.
# The JSON shape on the wire (Bus transport via EventV2Bridge):
#   {id: string, type: string, properties: {...event data fields...}}
#
# The EventV2Bridge translates core EventV2 events to Bus events:
#   EventV2.Payload {id, type, data: {...}} → Bus {id, type, properties: data}
# So all field paths are properties.* on the wire.
#
# The "type" field is the sole discriminator — dot-separated namespaced strings.
# All session.next.* events carry in properties:
#   {timestamp: number (ms UTC), sessionID: string, ...event-specific fields}
#
# Base schema: {timestamp: DateTimeUtcFromMillis, sessionID: Session.ID}
# All events use aggregate: "sessionID", version: 1.
#
# Token usage: session.next.step.ended → properties.tokens =
#   {input, output, reasoning, cache: {read, write}}
# Cost: session.next.step.ended → properties.cost (number, USD)
# Model: session.next.step.started → properties.model = {id, providerID, variant?}
#
# Timestamp: Despite the internal Schema name "DateTimeUtcFromMillis", the SSE
# wire format bypasses Schema.encode — JSON.stringify calls DateTime.Utc.toJSON()
# which returns an ISO 8601 UTC string (e.g. "2024-01-15T12:34:56.789Z").
#
# Prompt shape: {text: string, files?: FileAttachment[], agents?: AgentAttachment[],
#   references?: ReferenceAttachment[]}
# FileAttachment: {uri, mime, name?, description?, source?}
# AgentAttachment: {name, source?}
# ReferenceAttachment: {name, kind: "local"|"git"|"invalid", uri?, repository?,
#   branch?, target?, targetUri?, problem?, source?}
#
# ToolOutput.Structured: Record<string, any> (plain JSON object)
# ToolOutput.Content: tagged union on "type":
#   {type: "text", text: string} | {type: "file", uri: string, mime: string, name?: string}
#
# Instance SSE also emits server.connected and server.heartbeat with empty properties.
# Global SSE (/global/event) uses a DIFFERENT wire format — not covered by this YAML.
#
# 26 total events defined in All union at v1.2.24.

framework: opencode
framework_version: ">=1.2,<2.0"
ingestion_mode: stream
type_field: type
timestamp_field: properties.timestamp
default_kind: ""

motivation_events: ["session.next.text.ended"]
motivation_field: text

events:
  # ── Session lifecycle ──
  session.next.prompted:
    kind: message.user
    payload:
      session_id: properties.sessionID
      prompt_text: properties.prompt.text
      prompt_files: properties.prompt.files
      prompt_agents: properties.prompt.agents
      prompt_references: properties.prompt.references

  session.next.agent.switched:
    kind: workflow.agent_switched
    payload:
      session_id: properties.sessionID
      agent: properties.agent

  session.next.model.switched:
    kind: workflow.model_switched
    payload:
      session_id: properties.sessionID
      model_id: properties.model.id
      provider_id: properties.model.providerID
      variant: properties.model.variant

  session.next.synthetic:
    kind: message.system
    payload:
      session_id: properties.sessionID
      text: properties.text

  session.next.retried:
    kind: workflow.retried
    payload:
      session_id: properties.sessionID
      attempt: properties.attempt
      error_message: properties.error.message
      status_code: properties.error.statusCode
      is_retryable: properties.error.isRetryable
      response_headers: properties.error.responseHeaders
      response_body: properties.error.responseBody
      error_metadata: properties.error.metadata

  # ── Step events (LLM turn lifecycle) ──
  session.next.step.started:
    kind: llm.call.started
    payload:
      session_id: properties.sessionID
      agent: properties.agent
      model_id: properties.model.id
      provider_id: properties.model.providerID
      variant: properties.model.variant
      snapshot: properties.snapshot

  session.next.step.ended:
    kind: llm.call.completed
    payload:
      session_id: properties.sessionID
      finish: properties.finish
      cost: properties.cost
      input_tokens: properties.tokens.input
      output_tokens: properties.tokens.output
      reasoning_tokens: properties.tokens.reasoning
      cache_read_tokens: properties.tokens.cache.read
      cache_write_tokens: properties.tokens.cache.write
      snapshot: properties.snapshot

  session.next.step.failed:
    kind: llm.call.failed
    payload:
      session_id: properties.sessionID
      error_type: properties.error.type
      error_message: properties.error.message

  # ── Text streaming ──
  session.next.text.started:
    kind: message.assistant.started
    payload:
      session_id: properties.sessionID

  session.next.text.delta:
    kind: message.assistant.chunk
    payload:
      session_id: properties.sessionID
      delta: properties.delta

  session.next.text.ended:
    kind: message.assistant
    payload:
      session_id: properties.sessionID
      text: properties.text

  # ── Reasoning streaming ──
  session.next.reasoning.started:
    kind: llm.reasoning.started
    payload:
      session_id: properties.sessionID
      reasoning_id: properties.reasoningID

  session.next.reasoning.delta:
    kind: llm.reasoning.chunk
    payload:
      session_id: properties.sessionID
      reasoning_id: properties.reasoningID
      delta: properties.delta

  session.next.reasoning.ended:
    kind: llm.reasoning.completed
    payload:
      session_id: properties.sessionID
      reasoning_id: properties.reasoningID
      text: properties.text

  # ── Tool input streaming ──
  session.next.tool.input.started:
    kind: tool.input.started
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      name: properties.name

  session.next.tool.input.delta:
    kind: tool.input.chunk
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      delta: properties.delta

  session.next.tool.input.ended:
    kind: tool.input.completed
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      text: properties.text

  # ── Tool execution ──
  session.next.tool.called:
    kind: tool.call.started
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      tool: properties.tool
      input: properties.input
      provider_executed: properties.provider.executed
      provider_metadata: properties.provider.metadata

  session.next.tool.progress:
    kind: tool.call.progress
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      structured: properties.structured
      content: properties.content

  session.next.tool.success:
    kind: tool.call.completed
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      structured: properties.structured
      content: properties.content
      provider_executed: properties.provider.executed
      provider_metadata: properties.provider.metadata

  session.next.tool.failed:
    kind: tool.call.failed
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      error_type: properties.error.type
      error_message: properties.error.message
      provider_executed: properties.provider.executed
      provider_metadata: properties.provider.metadata

  # ── Shell events ──
  session.next.shell.started:
    kind: tool.call.started
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      tool: "literal:shell"
      input: properties.command

  session.next.shell.ended:
    kind: tool.call.completed
    payload:
      session_id: properties.sessionID
      call_id: properties.callID
      result: properties.output

  # ── Compaction events ──
  session.next.compaction.started:
    kind: workflow.compaction.started
    payload:
      session_id: properties.sessionID
      reason: properties.reason

  session.next.compaction.delta:
    kind: workflow.compaction.chunk
    payload:
      session_id: properties.sessionID
      text: properties.text

  session.next.compaction.ended:
    kind: workflow.compaction.completed
    payload:
      session_id: properties.sessionID
      text: properties.text
      include: properties.include
