# OpenHands event mapping for MappedJsonAdapter
# Targets: openhands >= 0.30 (JSON event files in workspace)
# Source: All-Hands-AI/OpenHands runtime event format.

framework: openhands
framework_version: ">=0.30"
ingestion_mode: file_watch
type_field: event_type
timestamp_field: timestamp

events:
  # ── Agent actions ──
  AgentThinkAction:
    kind: reasoning.started
    payload:
      content: thought
  AgentFinishAction:
    kind: session.ended
    payload:
      output: outputs.content
  AgentDelegateAction:
    kind: agent.spawned
    payload:
      agent_id: agent
      task: inputs.task
  AgentRejectAction:
    kind: session.error
    payload:
      message: outputs.reason

  # ── Command execution ──
  CmdRunAction:
    kind: command.started
    payload:
      command: command
      timeout: timeout
  CmdOutputObservation:
    kind: command.completed
    payload:
      content: content
      exit_code: exit_code

  # ── File operations ──
  FileReadAction:
    kind: file.read
    payload:
      path: path
  FileWriteAction:
    kind: file.edited
    payload:
      path: path
      content: content
  FileEditAction:
    kind: file.edited
    payload:
      path: path
      old_str: old_str
      new_str: new_str

  # ── IPython / code execution ──
  IPythonRunCellAction:
    kind: command.started
    payload:
      command: code
  IPythonRunCellObservation:
    kind: command.completed
    payload:
      content: content

  # ── Browser ──
  BrowseURLAction:
    kind: browser.launched
    payload:
      url: url
  BrowseInteractiveAction:
    kind: browser.action
    payload:
      browser_actions: browser_actions
  BrowserOutputObservation:
    kind: browser.result
    payload:
      content: content
      url: url

  # ── Messages ──
  MessageAction:
    kind: message.user
    payload:
      content: content
      role: role
  AgentMessageAction:
    kind: message.assistant
    payload:
      content: content

  # ── Memory/recall ──
  AgentRecallAction:
    kind: memory.query.started
    payload:
      query: query
  AgentRecallObservation:
    kind: memory.query.completed
    payload:
      content: memories

  # ── Checkpoints ──
  AgentStateCheckpoint:
    kind: checkpoint.created
    payload:
      checkpoint_id: id

  # ── Errors ──
  ErrorObservation:
    kind: session.error
    payload:
      message: content
  AgentStuckObservation:
    kind: session.error
    payload:
      message: content

  # ── Delegation results ──
  AgentDelegateObservation:
    kind: agent.completed
    payload:
      output: outputs.content
