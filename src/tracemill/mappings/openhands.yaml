# OpenHands event mapping for MappedJsonAdapter
# Targets: openhands >= 0.30 (JSON event files in workspace)
# Source: OpenHands/OpenHands openhands/events/serialization/event.py
#
# CRITICAL: OpenHands uses a COMPOUND discriminator:
#   - Action events have: {"action": "run", "args": {...}}
#   - Observation events have: {"observation": "run", "content": "...", "extras": {...}}
#
# A single type_field CANNOT handle both shapes. This YAML uses type_field: action
# which means ONLY action events are correctly discriminated. Observation events
# will resolve to type="unknown" (no "action" field) and fall to default_kind=raw.
#
# For full support, an OpenHandsPreProcessor is needed that:
#   1. Checks for "action" key → emits {"_type": "action.<value>", ...}
#   2. Checks for "observation" key → emits {"_type": "observation.<value>", ...}
#   3. Flattens args/extras into top-level for payload extraction
#
# Real top-level event fields:
#   id, timestamp, source, message, cause, action/observation, args/content+extras,
#   timeout, tool_call_metadata, llm_metrics

framework: openhands
framework_version: ">=0.30"
ingestion_mode: file_watch
type_field: action
timestamp_field: timestamp

events:
  # ── Action events (real — discriminated by "action" field value) ──
  run:
    kind: command.started
    payload:
      command: args.command
      thought: args.thought
      source: source
  run_ipython:
    kind: command.started
    payload:
      command: args.code
      source: source
  think:
    kind: reasoning.started
    payload:
      content: args.thought
      source: source
  finish:
    kind: session.ended
    payload:
      output: args.outputs.content
      source: source
  message:
    kind: message.user
    payload:
      content: args.content
      source: source
  delegate:
    kind: agent.spawned
    payload:
      agent_id: args.agent
      task: args.inputs.task
      source: source
  reject:
    kind: session.abort
    payload:
      message: args.outputs.reason
      source: source
  browse:
    kind: browser.launched
    payload:
      url: args.url
      source: source
  browse_interactive:
    kind: browser.action
    payload:
      actions: args.browser_actions
      source: source
  read:
    kind: file.read
    payload:
      path: args.path
      source: source
  write:
    kind: file.edited
    payload:
      path: args.path
      content: args.content
      source: source
  edit:
    kind: file.edited
    payload:
      path: args.path
      source: source
  recall:
    kind: memory.query.started
    payload:
      query: args.query
      source: source

  # NOTE: Observation events (observation: "run", "browse", etc.) will NOT
  # match because they lack an "action" field. They fall to default_kind=raw.
  # This is a known limitation requiring an OpenHandsPreProcessor.
