# smolagents (HuggingFace) event mapping for MappedJsonAdapter
# Targets: smolagents >= 1.0 (preprocessor-emitted JSONL)
# Source: huggingface/smolagents src/smolagents/memory.py
#
# CRITICAL: smolagents does NOT have a "step_type" discriminator field.
# Step type is inferred from FIELD PRESENCE in the serialized dict:
#   - has "step_number" → ActionStep
#   - has "plan" → PlanningStep
#   - has "task" (and no step_number) → TaskStep
#   - has "system_prompt" → SystemPromptStep
#
# Real ActionStep.dict() keys:
#   step_number, timing, model_input_messages, tool_calls, error,
#   model_output_message, model_output, observations, action_output,
#   token_usage, is_final_answer
#
# Real ToolCall dict: {id, type: "function", function: {name, arguments}}
# Real TokenUsage: {input_tokens, output_tokens, total_tokens}
#
# This YAML assumes a SmolagentsPreProcessor that adds a "step_type" field:
#   {"step_type": "ActionStep", "step_number": 1, ...}
#   {"step_type": "ToolCall", "tool_name": "web_search", ...}
#
# Without the preprocessor, all real smolagents steps resolve to "unknown" → raw.

framework: smolagents
framework_version: ">=1.0"
ingestion_mode: file_watch
type_field: step_type
timestamp_field: timestamp

events:
  # ── Agent lifecycle ──
  AgentStart:
    kind: session.started
    payload:
      agent_name: agent_name
      model: model_id
      task: task
  AgentEnd:
    kind: session.ended
    payload:
      agent_name: agent_name
      output: final_answer
  AgentError:
    kind: session.error
    payload:
      message: error
      agent_name: agent_name

  # ── Planning / thinking ──
  ThinkingStep:
    kind: reasoning.started
    payload:
      content: thought
      model: model_id
  PlanningStep:
    kind: planning.started
    payload:
      content: plan
      facts: facts

  # ── Tool calls ──
  ToolCall:
    kind: tool.call.started
    payload:
      tool_name: tool_name
      tool_call_id: call_id
      arguments: tool_input
  ToolOutput:
    kind: tool.call.completed
    payload:
      tool_call_id: call_id
      tool_name: tool_name
      result: output
  ToolError:
    kind: tool.call.failed
    payload:
      tool_call_id: call_id
      tool_name: tool_name
      error: error

  # ── Code execution (CodeAgent) ──
  CodeExecutionStep:
    kind: command.started
    payload:
      command: code
      language: language
  CodeExecutionResult:
    kind: command.completed
    payload:
      content: output
      exit_code: return_code

  # ── LLM calls ──
  LLMCall:
    kind: llm.call.started
    payload:
      model: model_id
      input_tokens: input_token_count
  LLMResponse:
    kind: llm.call.completed
    payload:
      model: model_id
      output: content
      input_tokens: input_token_count
      output_tokens: output_token_count
  LLMError:
    kind: llm.call.failed
    payload:
      model: model_id
      error: error

  # ── Multi-agent ──
  ManagedAgentCall:
    kind: agent.spawned
    payload:
      agent_id: agent_name
      task: task
  ManagedAgentResult:
    kind: agent.completed
    payload:
      agent_id: agent_name
      output: output

  # ── Memory ──
  MemoryStep:
    kind: memory.save.completed
    payload:
      content: memory

  # ── Usage ──
  TokenUsage:
    kind: telemetry.usage
    payload:
      input_tokens: input_tokens
      output_tokens: output_tokens
      cost_usd: cost
      model: model_id
