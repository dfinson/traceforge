# smolagents (HuggingFace) event mapping for MappedJsonAdapter
# Targets: smolagents >= 1.0 (structured step logging)
# Source: huggingface/smolagents agent step events.
# Note: smolagents emits structured step objects. Use a StepCallback
# that serializes to JSONL for file_watch ingestion.

framework: smolagents
framework_version: ">=1.0"
ingestion_mode: file_watch
type_field: step_type
timestamp_field: timestamp

events:
  # ── Agent lifecycle ──
  AgentStart:
    kind: session.started
    payload:
      agent_name: agent_name
      model: model_id
      task: task
  AgentEnd:
    kind: session.ended
    payload:
      agent_name: agent_name
      output: final_answer
  AgentError:
    kind: error
    payload:
      message: error
      agent_name: agent_name

  # ── Planning / thinking ──
  ThinkingStep:
    kind: reasoning.started
    payload:
      content: thought
      model: model_id
  PlanningStep:
    kind: planning.started
    payload:
      content: plan
      facts: facts

  # ── Tool calls ──
  ToolCall:
    kind: tool.call.started
    payload:
      tool_name: tool_name
      tool_call_id: call_id
      arguments: tool_input
  ToolOutput:
    kind: tool.call.completed
    payload:
      tool_call_id: call_id
      tool_name: tool_name
      result: output
  ToolError:
    kind: tool.call.failed
    payload:
      tool_call_id: call_id
      tool_name: tool_name
      error: error

  # ── Code execution (CodeAgent) ──
  CodeExecutionStep:
    kind: command.started
    payload:
      command: code
      language: language
  CodeExecutionResult:
    kind: command.completed
    payload:
      content: output
      exit_code: return_code

  # ── LLM calls ──
  LLMCall:
    kind: llm.call.started
    payload:
      model: model_id
      input_tokens: input_token_count
  LLMResponse:
    kind: llm.call.completed
    payload:
      model: model_id
      output: content
      input_tokens: input_token_count
      output_tokens: output_token_count
  LLMError:
    kind: llm.call.failed
    payload:
      model: model_id
      error: error

  # ── Multi-agent ──
  ManagedAgentCall:
    kind: agent.spawned
    payload:
      agent_id: agent_name
      task: task
  ManagedAgentResult:
    kind: agent.completed
    payload:
      agent_id: agent_name
      output: output

  # ── Memory ──
  MemoryStep:
    kind: memory.save.completed
    payload:
      content: memory

  # ── Usage ──
  TokenUsage:
    kind: usage
    payload:
      input_tokens: input_tokens
      output_tokens: output_tokens
      cost_usd: cost
      model: model_id
