# SWE-agent trajectory mapping for MappedJsonAdapter
# Targets: sweagent >= 0.7 (trajectory JSON files with history[] array)
# Source: SWE-agent/SWE-agent sweagent/types.py
#
# SWE-agent stores two arrays in .traj files:
#   - trajectory[]: action/observation pairs with NO role or timestamps
#   - history[]: chat messages with role (system/user/assistant/tool)
#
# This YAML maps the history[] format (role-discriminated).
# Trajectory entries need a separate preprocessor (no discriminator field).
# NOTE: SWE-agent history entries have NO per-entry timestamps.

framework: sweagent
framework_version: ">=0.7"
ingestion_mode: file_watch
type_field: role
timestamp_field: timestamp

events:
  # ── Agent actions (assistant with tool_calls nested inside) ──
  assistant:
    kind: message.assistant
    payload:
      content: content
      thought: thought
      action: action

  # ── Tool responses (role: tool — function-calling responses) ──
  tool:
    kind: tool.output
    payload:
      content: content

  # ── Environment observations (role: system) ──
  system:
    kind: message.system
    payload:
      content: content

  # ── User/task setup ──
  user:
    kind: message.user
    payload:
      content: content

  # ── Subroutine/agent delegation (aspirational — needs preprocessor) ──
  subroutine_start:
    kind: agent.spawned
    payload:
      agent_id: subroutine_name
  subroutine_end:
    kind: agent.completed
    payload:
      agent_id: subroutine_name
      output: output

  # ── Session lifecycle (from top-level .traj metadata, not per-entry) ──
  instance_start:
    kind: session.started
    payload:
      instance_id: instance_id
      model: model_name
  instance_end:
    kind: session.ended
    payload:
      instance_id: instance_id
      exit_status: exit_status
      submission: submission

  # ── Cost/usage (from model_stats in .traj top-level info dict) ──
  model_stats:
    kind: telemetry.usage
    payload:
      input_tokens: tokens_sent
      output_tokens: tokens_received
      cost_usd: instance_cost
      api_calls: api_calls
