<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="560" viewBox="0 0 1640 560" role="img" aria-label="TraceForge pipeline: Source, optional Parser, Adapter, Enricher, Pipeline, Sink(s), with an opt-in Governance branch off the Pipeline.">
